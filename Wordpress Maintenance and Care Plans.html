<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Maintenance & Care Plans — Hero Vector</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --wp-blue: #21759b;
    --wp-blue-deep: #135e7c;
    --wp-blue-darker: #0c4a63;
    --wp-blue-light: #4a9bc4;
    --wp-blue-soft: #d6ecf6;
    --ink: #0e2230;
    --ink-soft: #1c3a4f;
    --accent-coral: #ff6b5b;
    --accent-amber: #ffb74a;
    --accent-mint: #4fd1a8;
    --accent-violet: #7c6cf2;
    --accent-pink: #ef6ea8;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% 20%, #eef7fc 0%, transparent 60%),
      radial-gradient(900px 500px at 10% 90%, #f0e9ff 0%, transparent 60%),
      #fbfdff;
    color: var(--ink);
    min-height: 100vh;
  }

  .hero {
    max-width: 1340px;
    margin: 0 auto;
    padding: 56px 48px 80px;
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 48px;
    align-items: center;
    min-height: 100vh;
  }

  .hero-copy .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--wp-blue);
    background: var(--wp-blue-soft);
    padding: 6px 12px; border-radius: 999px;
  }
  .hero-copy .eyebrow::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-mint);
    box-shadow: 0 0 0 4px rgba(79, 209, 168, 0.2);
  }
  .hero-copy h1 {
    font-size: clamp(40px, 5vw, 68px);
    line-height: 1.02;
    letter-spacing: -0.028em;
    font-weight: 800;
    margin: 18px 0 18px;
    text-wrap: pretty;
  }
  .hero-copy h1 .grad {
    background: linear-gradient(120deg, var(--wp-blue) 0%, var(--accent-violet) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero-copy p {
    font-size: 18px; line-height: 1.55;
    color: var(--ink-soft);
    max-width: 52ch; margin: 0 0 28px;
  }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    font: inherit; font-weight: 600; font-size: 15px;
    padding: 14px 22px; border-radius: 12px;
    border: 1px solid transparent; cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary {
    background: var(--wp-blue); color: white;
    box-shadow: 0 8px 20px -8px rgba(33,117,155,0.7);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 24px -8px rgba(33,117,155,0.7); }
  .btn-ghost { background: white; color: var(--ink); border-color: #d9e3ea; }
  .btn-ghost:hover { border-color: var(--wp-blue); color: var(--wp-blue); }

  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-height: 640px;
    display: flex; align-items: center; justify-content: center;
  }
  .stage svg {
    width: 100%; height: 100%; display: block; overflow: visible;
  }

  /* Animations — same vocabulary as the other heroes */
  @keyframes float-a {
    0%   { transform: translate3d(0, 0, 0); }
    50%  { transform: translate3d(0, -10px, 0); }
    100% { transform: translate3d(0, 0, 0); }
  }
  @keyframes float-b {
    0%   { transform: translate3d(0, 0, 0); }
    50%  { transform: translate3d(0, -14px, 0); }
    100% { transform: translate3d(0, 0, 0); }
  }
  @keyframes float-c {
    0%   { transform: translate3d(0, 0, 0); }
    50%  { transform: translate3d(0, -8px, 0); }
    100% { transform: translate3d(0, 0, 0); }
  }
  @keyframes ring-pulse {
    0%   { transform: scale(0.85); opacity: 0.55; }
    80%  { opacity: 0.05; }
    100% { transform: scale(1.55); opacity: 0; }
  }
  @keyframes spin-slow { to { transform: rotate(360deg); } }
  @keyframes spin-rev  { to { transform: rotate(-360deg); } }
  @keyframes orbit { to { transform: rotate(360deg); } }
  @keyframes orbit-rev { to { transform: rotate(-360deg); } }
  @keyframes line-draw { to { stroke-dashoffset: 0; } }
  @keyframes dash-flow-fwd { to { stroke-dashoffset: -48; } }
  @keyframes pop-dot {
    0%, 100% { opacity: 0.35; transform: scale(0.9); }
    50%      { opacity: 1;    transform: scale(1.05); }
  }
  @keyframes shimmer-x {
    0%   { transform: translateX(-80px); }
    100% { transform: translateX(260px); }
  }
  @keyframes check-pop {
    0%, 70% { transform: scale(0.6); opacity: 0; }
    80%     { transform: scale(1.18); opacity: 1; }
    100%    { transform: scale(1);    opacity: 1; }
  }
  @keyframes heart-beat {
    0%, 100% { transform: scale(1); }
    20%      { transform: scale(1.12); }
    40%      { transform: scale(0.98); }
    60%      { transform: scale(1.08); }
  }
  @keyframes clock-sweep { to { transform: rotate(360deg); } }
  @keyframes ekg-draw {
    0%   { stroke-dashoffset: 360; }
    60%  { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: -360; }
  }

  .anim-float-a, .anim-float-b, .anim-float-c,
  .anim-ring, .anim-spin, .anim-spin-rev, .anim-orbit, .anim-orbit-rev,
  .anim-line, .anim-dash-fwd, .anim-dot, .anim-heart, .anim-clock, .anim-ekg {
    will-change: transform, opacity;
    backface-visibility: hidden;
    transform: translateZ(0);
  }

  .anim-float-a { animation: float-a 7s   cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-b { animation: float-b 8s   cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-c { animation: float-c 6.5s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-ring    { animation: ring-pulse 3.2s cubic-bezier(.25,.6,.35,1) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-spin     { animation: spin-slow 24s linear infinite; transform-origin: center; transform-box: fill-box; }
  .anim-spin-rev { animation: spin-rev  28s linear infinite; transform-origin: center; transform-box: fill-box; }
  .anim-orbit     { animation: orbit 32s linear infinite; transform-origin: 280px 280px; }
  .anim-orbit-rev { animation: orbit-rev 38s linear infinite; transform-origin: 280px 280px; }
  .anim-line     { stroke-dasharray: 280; stroke-dashoffset: 280; animation: line-draw 4s cubic-bezier(.34,.01,.21,1) infinite alternate; }
  .anim-dash-fwd { stroke-dasharray: 6 6; animation: dash-flow-fwd 2.2s linear infinite; }
  .anim-dot      { animation: pop-dot 3s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-check    { animation: check-pop 4s cubic-bezier(.34,.01,.21,1) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-heart    { animation: heart-beat 1.6s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-clock    { animation: clock-sweep 8s linear infinite; transform-origin: center; transform-box: fill-box; }
  .anim-ekg      { stroke-dasharray: 360; stroke-dashoffset: 360; animation: ekg-draw 3.4s cubic-bezier(.45,.05,.55,.95) infinite; }
  .anim-shimmer  { animation: shimmer-x 4s ease-in-out infinite; }

  .stage svg, .stage svg text {
    text-rendering: geometricPrecision;
    shape-rendering: geometricPrecision;
  }

  @media (prefers-reduced-motion: reduce) {
    .anim-float-a, .anim-float-b, .anim-float-c, .anim-ring, .anim-spin, .anim-spin-rev,
    .anim-orbit, .anim-orbit-rev, .anim-line, .anim-dash-fwd, .anim-dot, .anim-check,
    .anim-heart, .anim-clock, .anim-ekg, .anim-shimmer { animation: none; }
    .anim-line, .anim-ekg { stroke-dashoffset: 0; }
  }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; padding: 32px 20px 60px; }
    .hero-copy { order: 2; }
    .stage { order: 1; max-height: 520px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-copy">
    <span class="eyebrow">WordPress · Care Plans</span>
    <h1>Maintenance &amp;<br><span class="grad">Care Plans</span></h1>
    <p>Your site, always updated, always backed up. Proactive monitoring, weekly updates, daily backups, and uptime watch — handled by senior engineers while you sleep.</p>
    <div class="hero-cta">
      <button class="btn btn-primary">Start a care plan</button>
      <button class="btn btn-ghost">See what&rsquo;s included</button>
    </div>
  </div>

  <div class="stage" aria-label="Illustration of a WordPress site under continuous care: monitoring heartbeat, scheduled updates, backups, and security shield">
    <svg viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg" role="img">
      <defs>
        <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f3f8fb"/>
        </linearGradient>
        <linearGradient id="hubHeader" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#21759b"/>
          <stop offset="100%" stop-color="#7c6cf2"/>
        </linearGradient>

        <!-- Hex badges -->
        <linearGradient id="bUpd"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a9bc4"/><stop offset="100%" stop-color="#21759b"/></linearGradient>
        <linearGradient id="bBkp"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7ee0bf"/><stop offset="100%" stop-color="#3fb98d"/></linearGradient>
        <linearGradient id="bSec"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9d8ff8"/><stop offset="100%" stop-color="#7c6cf2"/></linearGradient>
        <linearGradient id="bUpt"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8a7d"/><stop offset="100%" stop-color="#ff6b5b"/></linearGradient>
        <linearGradient id="bSpd"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffd06b"/><stop offset="100%" stop-color="#f5a623"/></linearGradient>
        <linearGradient id="bSup"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f7a3c6"/><stop offset="100%" stop-color="#ef6ea8"/></linearGradient>

        <!-- EKG line -->
        <linearGradient id="ekgGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#3fb98d" stop-opacity="0"/>
          <stop offset="50%" stop-color="#3fb98d"/>
          <stop offset="100%" stop-color="#3fb98d" stop-opacity="0"/>
        </linearGradient>

        <!-- Soft glow -->
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#7c6cf2" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#7c6cf2" stop-opacity="0"/>
        </radialGradient>

        <linearGradient id="shimmerGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="white" stop-opacity="0"/>
          <stop offset="50%" stop-color="white" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>
        <clipPath id="hubClip"><rect x="170" y="170" width="220" height="220" rx="18"/></clipPath>
      </defs>

      <!-- =====================================================
           BACKDROP — soft glow + orbit guides
           ===================================================== -->
      <circle cx="280" cy="280" r="240" fill="url(#centerGlow)"/>

      <!-- Concentric guides hint at "always-on" cycle -->
      <circle cx="280" cy="280" r="200" fill="none" stroke="#cfdde5" stroke-width="1" stroke-dasharray="2 6" opacity="0.7"/>
      <circle cx="280" cy="280" r="248" fill="none" stroke="#cfdde5" stroke-width="1" stroke-dasharray="2 6" opacity="0.5"/>

      <!-- Outer rotating "schedule ring" — a clock-like sweep -->
      <g class="anim-clock" transform="translate(280 280)">
        <circle r="224" fill="none" stroke="#7c6cf2" stroke-width="1.4"
                stroke-dasharray="3 12" opacity="0.45"/>
        <!-- 4 quarter ticks ride around with the ring -->
        <circle cx="224"  cy="0"   r="3" fill="#21759b"/>
        <circle cx="0"    cy="224" r="3" fill="#3fb98d"/>
        <circle cx="-224" cy="0"   r="3" fill="#7c6cf2"/>
        <circle cx="0"    cy="-224" r="3" fill="#ffb74a"/>
      </g>

      <!-- Orbiting micro-dots -->
      <g class="anim-orbit">
        <circle cx="480" cy="280" r="2.6" fill="#21759b"/>
        <circle cx="80"  cy="280" r="2.6" fill="#7c6cf2"/>
      </g>
      <g class="anim-orbit-rev">
        <circle cx="421" cy="421" r="2"  fill="#ef6ea8"/>
        <circle cx="139" cy="139" r="2"  fill="#21759b" opacity="0.7"/>
      </g>

      <!-- Pulse rings beneath the hub -->
      <g transform="translate(280 280)">
        <circle class="anim-ring" r="120" fill="none" stroke="#7c6cf2" stroke-width="1.6" opacity="0.5"/>
        <circle class="anim-ring" style="animation-delay:1.3s" r="120" fill="none" stroke="#21759b" stroke-width="1.6" opacity="0.5"/>
      </g>

      <!-- =====================================================
           CENTER HUB — "Site health" monitor card
           ===================================================== -->
      <g>
        <g class="anim-float-b">
          <!-- Drop shadow -->
          <rect x="174" y="178" width="220" height="220" rx="18" fill="#0c4a63" opacity="0.10"/>
          <!-- Card -->
          <rect x="170" y="170" width="220" height="220" rx="18" fill="url(#cardBg)" stroke="#cfdde5"/>
          <!-- Header -->
          <rect x="170" y="170" width="220" height="40" rx="18" fill="url(#hubHeader)"/>
          <rect x="170" y="192" width="220" height="18" fill="url(#hubHeader)"/>
          <rect x="170" y="200" width="220" height="10" fill="url(#hubHeader)"/>
          <!-- Window dots -->
          <circle cx="186" cy="190" r="3.4" fill="#ffffff" opacity="0.85"/>
          <circle cx="198" cy="190" r="3.4" fill="#ffffff" opacity="0.6"/>
          <circle cx="210" cy="190" r="3.4" fill="#ffffff" opacity="0.4"/>
          <!-- Title bars -->
          <rect x="230" y="187" width="70" height="6" rx="3" fill="#ffffff" opacity="0.85"/>
          <rect x="230" y="196" width="44" height="4" rx="2" fill="#ffffff" opacity="0.5"/>
          <!-- Live dot -->
          <circle cx="372" cy="190" r="4" fill="#4fd1a8"/>
          <circle cx="372" cy="190" r="4" fill="#4fd1a8" opacity="0.4">
            <animate attributeName="r" values="4;9;4" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
          </circle>

          <!-- Heartbeat block -->
          <g transform="translate(186 226)">
            <!-- Label bar -->
            <rect x="0" y="0" width="58" height="5" rx="2.5" fill="#cfdde5"/>
            <!-- Heart icon -->
            <g transform="translate(10 22)" class="anim-heart">
              <path d="M 0 6
                       C -10 -2, -10 -14, 0 -10
                       C 10 -14, 10 -2, 0 6 Z"
                    fill="#ff6b5b"/>
            </g>
            <!-- BPM bars (placeholder for big number) -->
            <rect x="26" y="10" width="22" height="18" rx="3" fill="#0e2230"/>
            <rect x="52" y="10" width="14" height="18" rx="3" fill="#0e2230"/>
            <rect x="70" y="10" width="30" height="18" rx="3" fill="#0e2230"/>
            <!-- Healthy pill -->
            <g transform="translate(120 8)">
              <rect width="56" height="20" rx="10" fill="#e8f8f0"/>
              <path d="M 8 11 L 12 15 L 22 5" stroke="#3fb98d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="28" y="7" width="4" height="6" rx="1" fill="#3fb98d"/>
              <rect x="34" y="5" width="4" height="8" rx="1" fill="#3fb98d"/>
              <rect x="40" y="3" width="4" height="10" rx="1" fill="#3fb98d"/>
            </g>
          </g>

          <!-- EKG / heartbeat line -->
          <g transform="translate(186 280)">
            <!-- Gridlines -->
            <g stroke="#eef3f6" stroke-width="1">
              <line x1="0" y1="0"  x2="188" y2="0"/>
              <line x1="0" y1="22" x2="188" y2="22"/>
              <line x1="0" y1="44" x2="188" y2="44"/>
              <line x1="0" y1="66" x2="188" y2="66"/>
              <line x1="0" y1="88" x2="188" y2="88"/>
            </g>
            <!-- Baseline -->
            <line x1="0" y1="50" x2="188" y2="50" stroke="#cfdde5" stroke-width="1" stroke-dasharray="2 4"/>
            <!-- EKG path -->
            <path class="anim-ekg"
                  d="M 0 50 L 24 50 L 32 50 L 38 30 L 46 70 L 54 20 L 62 60 L 70 50
                     L 96 50 L 104 50 L 110 32 L 118 68 L 126 26 L 134 56 L 142 50
                     L 188 50"
                  fill="none" stroke="url(#ekgGrad)" stroke-width="2.6"
                  stroke-linecap="round" stroke-linejoin="round"/>
            <!-- Trailing pulse dot -->
            <circle cx="142" cy="50" r="3.4" fill="#3fb98d">
              <animate attributeName="cx" values="0;188;0" dur="3.4s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0;1;1;0" dur="3.4s" repeatCount="indefinite"/>
            </circle>
          </g>

          <!-- Status row: 3 mini status pills (placeholder for stat tiles) -->
          <g transform="translate(186 380)">
            <rect x="0"  y="0" width="56" height="14" rx="7" fill="#eef7fc" stroke="#cfdde5"/>
            <circle cx="9" cy="7" r="2.6" fill="#21759b"/>
            <rect x="16" y="5" width="32" height="4" rx="2" fill="#21759b" opacity="0.7"/>

            <rect x="66" y="0" width="56" height="14" rx="7" fill="#e8f8f0" stroke="#cfdde5"/>
            <circle cx="75" cy="7" r="2.6" fill="#3fb98d"/>
            <rect x="82" y="5" width="32" height="4" rx="2" fill="#3fb98d" opacity="0.7"/>

            <rect x="132" y="0" width="56" height="14" rx="7" fill="#f3eeff" stroke="#cfdde5"/>
            <circle cx="141" cy="7" r="2.6" fill="#7c6cf2"/>
            <rect x="148" y="5" width="32" height="4" rx="2" fill="#7c6cf2" opacity="0.7"/>
          </g>

          <!-- Shimmer sweep -->
          <g clip-path="url(#hubClip)">
            <rect class="anim-shimmer" x="170" y="170" width="60" height="220" fill="url(#shimmerGrad)" opacity="0.55"/>
          </g>
        </g>
      </g>

      <!-- =====================================================
           CONNECTOR DASHES — center → each hex badge
           Endpoints land on hex bodies, not labels
           ===================================================== -->
      <g fill="none" stroke-linecap="round">
        <path d="M 220 196 Q 165 155 128 118" stroke="#21759b" stroke-width="1.6" opacity="0.28"/>
        <path d="M 220 196 Q 165 155 128 118" class="anim-dash-fwd" stroke="#21759b" stroke-width="1.8"/>

        <path d="M 280 170 L 280 102" stroke="#3fb98d" stroke-width="1.6" opacity="0.28"/>
        <path d="M 280 170 L 280 102" class="anim-dash-fwd" style="animation-delay:.3s" stroke="#3fb98d" stroke-width="1.8"/>

        <path d="M 340 196 Q 395 155 432 118" stroke="#7c6cf2" stroke-width="1.6" opacity="0.28"/>
        <path d="M 340 196 Q 395 155 432 118" class="anim-dash-fwd" style="animation-delay:.6s" stroke="#7c6cf2" stroke-width="1.8"/>

        <path d="M 220 364 Q 170 410 138 452" stroke="#ff6b5b" stroke-width="1.6" opacity="0.28"/>
        <path d="M 220 364 Q 170 410 138 452" class="anim-dash-fwd" style="animation-delay:.9s" stroke="#ff6b5b" stroke-width="1.8"/>

        <path d="M 280 388 L 280 470" stroke="#f5a623" stroke-width="1.6" opacity="0.28"/>
        <path d="M 280 388 L 280 470" class="anim-dash-fwd" style="animation-delay:1.2s" stroke="#f5a623" stroke-width="1.8"/>

        <path d="M 340 364 Q 390 410 422 452" stroke="#ef6ea8" stroke-width="1.6" opacity="0.28"/>
        <path d="M 340 364 Q 390 410 422 452" class="anim-dash-fwd" style="animation-delay:1.5s" stroke="#ef6ea8" stroke-width="1.8"/>
      </g>

      <!-- =====================================================
           HEX BADGES — what's covered in the care plan
           Top: UPDATES, BACKUPS, SECURITY
           Bottom: UPTIME, SPEED, SUPPORT
           ===================================================== -->

      <!-- UPDATES (top-left) -->
      <g class="anim-float-a">
        <g transform="translate(110 100)">
          <path d="M -32 -18 L 0 -36 L 32 -18 L 32 18 L 0 36 L -32 18 Z"
                fill="url(#bUpd)" stroke="#0c4a63" stroke-width="1"/>
          <path d="M -28 -16 L 0 -32 L 28 -16" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
          <!-- Refresh / update arrow icon -->
          <g transform="translate(0 -4)" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M -10 0 a 10 10 0 1 1 3 7"/>
            <path d="M -12 -6 L -10 0 L -4 -2"/>
          </g>
          <g transform="translate(0 50)">
            <circle cx="-8" cy="0" r="2" fill="#21759b" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2" fill="#21759b" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2" fill="#21759b" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- BACKUPS (top-center) -->
      <g class="anim-float-b">
        <g transform="translate(280 70)">
          <path d="M -34 -19 L 0 -38 L 34 -19 L 34 19 L 0 38 L -34 19 Z"
                fill="url(#bBkp)" stroke="#2ea077" stroke-width="1"/>
          <!-- Cloud + down arrow -->
          <g transform="translate(0 -4)" fill="#ffffff" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round">
            <path d="M -12 0 a 6 6 0 0 1 6 -6 a 7 7 0 0 1 13 1 a 5 5 0 0 1 0 10 H -8 a 5 5 0 0 1 -4 -5 Z"/>
            <g fill="none" stroke="#3fb98d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 0 4 V 14"/>
              <path d="M -4 10 L 0 14 L 4 10"/>
            </g>
          </g>
          <g transform="translate(0 52)">
            <circle cx="-8" cy="0" r="2.2" fill="#3fb98d" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2.2" fill="#3fb98d" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2.2" fill="#3fb98d" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- SECURITY (top-right) -->
      <g class="anim-float-c">
        <g transform="translate(450 100)">
          <path d="M -32 -18 L 0 -36 L 32 -18 L 32 18 L 0 36 L -32 18 Z"
                fill="url(#bSec)" stroke="#5847d4" stroke-width="1"/>
          <!-- Shield with check -->
          <g transform="translate(0 -2)">
            <path d="M 0 -14 L 12 -9 L 12 1 Q 12 9 0 14 Q -12 9 -12 1 L -12 -9 Z"
                  fill="#ffffff"/>
            <path d="M -5 -1 L -1 4 L 6 -5"
                  fill="none" stroke="#7c6cf2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <g transform="translate(0 50)">
            <circle cx="-8" cy="0" r="2" fill="#7c6cf2" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2" fill="#7c6cf2" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2" fill="#7c6cf2" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- UPTIME (bottom-left) -->
      <g class="anim-float-a" style="animation-delay:-.8s">
        <g transform="translate(120 470)">
          <path d="M -32 -18 L 0 -36 L 32 -18 L 32 18 L 0 36 L -32 18 Z"
                fill="url(#bUpt)" stroke="#c0382e" stroke-width="1"/>
          <!-- Clock icon (with animated sweep hand) -->
          <g transform="translate(0 -2)">
            <circle r="11" fill="none" stroke="#ffffff" stroke-width="2"/>
            <circle r="1.6" fill="#ffffff"/>
            <g class="anim-clock">
              <line x1="0" y1="0" x2="0" y2="-7" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
            </g>
            <line x1="0" y1="0" x2="6" y2="0" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
          </g>
          <g transform="translate(0 50)">
            <circle cx="-8" cy="0" r="2" fill="#ff6b5b" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2" fill="#ff6b5b" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2" fill="#ff6b5b" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- SPEED (bottom-center) -->
      <g class="anim-float-b" style="animation-delay:-1.0s">
        <g transform="translate(280 500)">
          <path d="M -34 -19 L 0 -38 L 34 -19 L 34 19 L 0 38 L -34 19 Z"
                fill="url(#bSpd)" stroke="#d68812" stroke-width="1"/>
          <!-- Gauge / speedometer icon -->
          <g transform="translate(0 -2)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M -12 4 a 12 12 0 0 1 24 0"/>
            <path d="M -8 4 a 8 8 0 0 1 16 0" opacity="0.6"/>
            <path d="M 0 4 L 6 -6"/>
            <circle cx="0" cy="4" r="1.6" fill="#ffffff" stroke="none"/>
          </g>
          <g transform="translate(0 52)">
            <circle cx="-8" cy="0" r="2.2" fill="#f5a623" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2.2" fill="#f5a623" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2.2" fill="#f5a623" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- SUPPORT (bottom-right) -->
      <g class="anim-float-c" style="animation-delay:-1.2s">
        <g transform="translate(440 470)">
          <path d="M -32 -18 L 0 -36 L 32 -18 L 32 18 L 0 36 L -32 18 Z"
                fill="url(#bSup)" stroke="#b94a82" stroke-width="1"/>
          <!-- Headset / chat icon -->
          <g transform="translate(0 -1)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M -10 2 a 10 10 0 0 1 20 0 V 6"/>
            <rect x="-12" y="2" width="6" height="9" rx="2" fill="#ffffff" stroke="none"/>
            <rect x="6"   y="2" width="6" height="9" rx="2" fill="#ffffff" stroke="none"/>
            <path d="M 10 11 V 13 a 4 3 0 0 1 -4 3 H 0"/>
            <circle cx="-2" cy="16" r="1.4" fill="#ffffff" stroke="none"/>
          </g>
          <g transform="translate(0 50)">
            <circle cx="-8" cy="0" r="2" fill="#ef6ea8" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2" fill="#ef6ea8" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2" fill="#ef6ea8" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- =====================================================
           CORNER ATMOSPHERE
           ===================================================== -->
      <!-- "24 / 7" chip (top-left): two number-bars with a slash -->
      <g class="anim-float-a" style="animation-delay:-.4s">
        <g transform="translate(40 240)">
          <rect width="92" height="28" rx="14" fill="#ffffff" stroke="#cfdde5"/>
          <!-- moon icon -->
          <g transform="translate(15 14)" fill="none" stroke="#21759b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 5 -5 a 6 6 0 1 0 0 10 a 5 5 0 0 1 0 -10 Z" fill="#21759b" stroke="none"/>
            <circle cx="-3" cy="-4" r="0.8" fill="#ffb74a" stroke="none"/>
            <circle cx="-7" cy="2" r="0.6" fill="#ffb74a" stroke="none"/>
          </g>
          <!-- bar pair: 24 / 7 representation -->
          <rect x="32" y="9"  width="14" height="4" rx="2" fill="#0e2230"/>
          <rect x="48" y="9"  width="14" height="4" rx="2" fill="#0e2230"/>
          <line x1="65" y1="6" x2="71" y2="22" stroke="#cfdde5" stroke-width="1.6" stroke-linecap="round"/>
          <rect x="74" y="9"  width="10" height="4" rx="2" fill="#0e2230"/>
          <!-- subtitle bar -->
          <rect x="32" y="17" width="52" height="4" rx="2" fill="#cfdde5"/>
        </g>
      </g>

      <!-- Spinning gear (top-right atmosphere) -->
      <g transform="translate(490 250)">
        <g class="anim-spin">
          <circle r="22" fill="#ffffff" stroke="#cfdde5" stroke-width="1.4"/>
          <circle r="9" fill="#21759b"/>
          <circle r="4" fill="#0c4a63"/>
          <g fill="#21759b">
            <rect x="-2.5" y="-26" width="5" height="7" rx="1.5"/>
            <rect x="-2.5" y="19"  width="5" height="7" rx="1.5"/>
            <rect x="-26" y="-2.5" width="7" height="5" rx="1.5"/>
            <rect x="19"  y="-2.5" width="7" height="5" rx="1.5"/>
            <rect x="-21" y="-21" width="7" height="5" rx="1.5" transform="rotate(45)"/>
            <rect x="14"  y="-21" width="7" height="5" rx="1.5" transform="rotate(45)"/>
            <rect x="-21" y="16"  width="7" height="5" rx="1.5" transform="rotate(45)"/>
            <rect x="14"  y="16"  width="7" height="5" rx="1.5" transform="rotate(45)"/>
          </g>
        </g>
      </g>

      <!-- Counter-rotating smaller gear (front) — "always working" -->
      <g transform="translate(450 280)">
        <g class="anim-spin-rev">
          <circle r="14" fill="#ffffff" stroke="#cfdde5" stroke-width="1.2"/>
          <circle r="5" fill="#7c6cf2"/>
          <g fill="#7c6cf2">
            <rect x="-1.5" y="-17" width="3" height="5" rx="1"/>
            <rect x="-1.5" y="12"  width="3" height="5" rx="1"/>
            <rect x="-17" y="-1.5" width="5" height="3" rx="1"/>
            <rect x="12"  y="-1.5" width="5" height="3" rx="1"/>
            <rect x="-13" y="-13" width="5" height="3" rx="1" transform="rotate(45)"/>
            <rect x="8"   y="-13" width="5" height="3" rx="1" transform="rotate(45)"/>
            <rect x="-13" y="10"  width="5" height="3" rx="1" transform="rotate(45)"/>
            <rect x="8"   y="10"  width="5" height="3" rx="1" transform="rotate(45)"/>
          </g>
        </g>
      </g>

      <!-- Connecting accent dots -->
      <g>
        <circle class="anim-dot" cx="280" cy="40" r="3" fill="#3fb98d"/>
        <circle class="anim-dot" style="animation-delay:.4s" cx="40"  cy="370" r="2.5" fill="#21759b"/>
        <circle class="anim-dot" style="animation-delay:.8s" cx="520" cy="370" r="2.5" fill="#7c6cf2"/>
        <circle class="anim-dot" style="animation-delay:1.2s" cx="280" cy="540" r="3" fill="#f5a623"/>
      </g>

    </svg>
  </div>
</section>
