<!DOCTYPE html><html lang="en"><head>


<meta charset="utf-8">
<title>WordPress Custom Plugin Development — Hero Vector</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --wp-blue: #21759b;
    --wp-blue-deep: #135e7c;
    --wp-blue-darker: #0c4a63;
    --wp-blue-light: #4a9bc4;
    --wp-blue-soft: #d6ecf6;
    --ink: #0e2230;
    --ink-soft: #1c3a4f;
    --paper: #ffffff;
    --paper-warm: #f7fafc;
    --accent-coral: #ff6b5b;
    --accent-amber: #ffb74a;
    --accent-mint: #4fd1a8;
    --accent-violet: #7c6cf2;
    --accent-pink: #ef6ea8;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% 20%, #eef7fc 0%, transparent 60%),
      radial-gradient(900px 500px at 10% 90%, #f0e9ff 0%, transparent 60%),
      #fbfdff;
    color: var(--ink);
    min-height: 100vh;
  }

  .hero {
    max-width: 1320px;
    margin: 0 auto;
    padding: 56px 48px 80px;
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 32px;
    align-items: center;
    min-height: 100vh;
  }

  .hero-copy .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--wp-blue);
    background: var(--wp-blue-soft);
    padding: 6px 12px;
    border-radius: 999px;
  }
  .hero-copy .eyebrow::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-violet);
    box-shadow: 0 0 0 4px rgba(124, 108, 242, 0.2);
  }
  .hero-copy h1 {
    font-size: clamp(36px, 4.4vw, 60px);
    line-height: 1.04;
    letter-spacing: -0.025em;
    font-weight: 800;
    margin: 18px 0 18px;
    text-wrap: pretty;
  }
  .hero-copy h1 em {
    font-style: normal;
    background: linear-gradient(120deg, var(--wp-blue) 0%, var(--accent-violet) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hero-copy p {
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 48ch;
    margin: 0 0 28px;
  }
  .hero-cta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn {
    font: inherit;
    font-weight: 600;
    font-size: 15px;
    padding: 14px 22px;
    border-radius: 12px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary {
    background: var(--wp-blue);
    color: white;
    box-shadow: 0 8px 20px -8px rgba(33,117,155,0.7);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 24px -8px rgba(33,117,155,0.7); }
  .btn-ghost {
    background: white;
    color: var(--ink);
    border-color: #d9e3ea;
  }
  .btn-ghost:hover { border-color: var(--wp-blue); color: var(--wp-blue); }

  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 10;
  }
  .stage svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  /* Animations */
  @keyframes float-a {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-8px) rotate(0.4deg); }
  }
  @keyframes float-b {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }
  @keyframes float-c {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes spin-rev {
    from { transform: rotate(360deg); }
    to   { transform: rotate(0deg); }
  }
  @keyframes ring-pulse {
    0%   { transform: scale(0.9); opacity: 0.55; }
    100% { transform: scale(1.45); opacity: 0; }
  }
  @keyframes caret-blink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  @keyframes type-line {
    0%   { width: 0; }
    100% { width: var(--w, 100%); }
  }
  @keyframes dash-flow {
    to { stroke-dashoffset: -40; }
  }

  .anim-float-a { animation: float-a 5.5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-b { animation: float-b 6.2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-c { animation: float-c 4.8s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-spin    { animation: spin-slow 18s linear infinite; transform-origin: center; transform-box: fill-box; }
  .anim-spin-rev { animation: spin-rev 22s linear infinite; transform-origin: center; transform-box: fill-box; }
  .anim-ring    { animation: ring-pulse 2.6s ease-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-caret   { animation: caret-blink 1.1s steps(2) infinite; }
  .anim-dash    { stroke-dasharray: 6 6; animation: dash-flow 1.6s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    .anim-float-a, .anim-float-b, .anim-float-c,
    .anim-spin, .anim-spin-rev, .anim-ring,
    .anim-caret, .anim-dash {
      animation: none;
    }
  }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; padding: 32px 20px 60px; }
    .hero-copy { order: 2; }
    .stage { order: 1; }
  }
</style>
</head>
<body data-cc-id="cc-1" style="cursor: crosshair; background-color: rgb(255, 255, 255); font-family: sans-serif; font-size: 18px;">

<section class="hero" data-cc-id="cc-7">
  <div class="hero-copy" data-cc-id="cc-5">
    <span class="eyebrow">WordPress Engineering</span>
    <h1 data-cc-id="cc-4" style="">Custom <em>plugins</em> built around how your team actually works.</h1>

    <div class="hero-cta">
      <button class="btn btn-primary" data-cc-id="cc-6" style="">Get a plugin</button>
      <button class="btn btn-ghost">View case studies</button>

  <div class="stage" aria-label="Isometric illustration of WordPress custom plugin development with a code editor, plug socket, and orbiting modules">

        <linearGradient id="plugSide" x1="0" y1="0" x2="0" y2="1">

        </linearGradient>
        <linearGradient id="plugCable" x1="0" y1="0" x2="1" y2="0">

        <linearGradient id="chipMint" x1="0" y1="0" x2="0" y2="1">

          <stop offset="100%" stop-color="#3fb98d"></stop>
        </linearGradient>
        <linearGradient id="chipViolet" x1="0" y1="0" x2="0" y2="1">

        <linearGradient id="chipAmber" x1="0" y1="0" x2="0" y2="1">

          <stop offset="100%" stop-color="#f5a623"></stop>
        </linearGradient>
        <linearGradient id="chipPink" x1="0" y1="0" x2="0" y2="1">

          <stop offset="100%" stop-color="#ef6ea8"></stop>

          <!-- Sidebar (file tree) -->

          <g transform="translate(72 36)">

            <g font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#3a5366" text-anchor="end">

              <text x="14" y="38">3</text>
              <text x="14" y="52">4</text>
              <text x="14" y="66">5</text>
              <text x="14" y="80">6</text>
              <text x="14" y="94">7</text>
              <text x="14" y="108">8</text>
              <text x="14" y="122">9</text>
              <text x="14" y="136">10</text>

            <!-- Code "lines" as stylized colored bars (typed-in feel) -->

              <rect y="0" width="42" height="6" rx="2" fill="#ef6ea8"></rect>
              <!-- L2: comment -->

              <!-- L4: namespace -->
              <rect y="42" width="36" height="6" rx="2" fill="#7c6cf2"></rect>
              <rect x="40" y="42" width="78" height="6" rx="2" fill="#cfdde5"></rect>
              <!-- L5: blank -->
              <!-- L6: add_action -->

              <!-- L8: indented body -->

              <rect x="54" y="98" width="80" height="6" rx="2" fill="#cfdde5"></rect>

              <rect y="154" width="36" height="6" rx="2" fill="#7c6cf2"></rect>

            </g>
          </g>

          <!-- Status bar -->
          <rect x="0" y="206" width="320" height="14" fill="#21759b"></rect>
          <g font-family="ui-monospace, Menlo, monospace" font-size="8" fill="#ffffff" opacity="0.9">

      <path d="M 380 300 C 430 320, 470 300, 500 280" class="anim-dash" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" opacity="0.55"></path>

      <!-- Plug -->

        <g transform="translate(500 240)">

      <!-- Socket on right (the "WordPress core" connection point) -->

      <!-- Bottom-left: CRON chip (puzzle piece style) -->
      <g class="anim-float-a" style="animation-delay:1s">
        <g transform="translate(360 410)">
