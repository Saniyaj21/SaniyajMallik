<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Custom Web Applications — Hero Vector</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --wp-blue: #21759b;
    --wp-blue-deep: #135e7c;
    --wp-blue-darker: #0c4a63;
    --wp-blue-light: #4a9bc4;
    --wp-blue-soft: #d6ecf6;
    --ink: #0e2230;
    --ink-soft: #1c3a4f;
    --accent-coral: #ff6b5b;
    --accent-amber: #ffb74a;
    --accent-mint: #4fd1a8;
    --accent-violet: #7c6cf2;
    --accent-pink: #ef6ea8;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background: #ffffff;
    color: var(--ink);
    min-height: 100vh;
  }

  .hero {
    max-width: 1340px;
    margin: 0 auto;
    padding: 56px 48px 80px;
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 48px;
    align-items: center;
    min-height: 100vh;
  }

  .hero-num {
    display: inline-block;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.14em; color: #8aa3b3;
    margin-bottom: 10px;
  }
  .hero-copy .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--wp-blue);
    background: var(--wp-blue-soft);
    padding: 6px 12px; border-radius: 999px;
  }
  .hero-copy .eyebrow::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-violet);
    box-shadow: 0 0 0 4px rgba(124, 108, 242, 0.2);
  }
  .hero-copy h1 {
    font-size: clamp(40px, 5vw, 68px);
    line-height: 1.02;
    letter-spacing: -0.028em;
    font-weight: 800;
    margin: 18px 0 18px;
    text-wrap: pretty;
    color: var(--ink);
  }
  .hero-copy h1 .grad {
    background: linear-gradient(120deg, var(--wp-blue) 0%, var(--accent-violet) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero-copy p {
    font-size: 18px; line-height: 1.55;
    color: var(--ink-soft);
    max-width: 52ch; margin: 0 0 28px;
  }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    font: inherit; font-weight: 600; font-size: 15px;
    padding: 14px 22px; border-radius: 12px;
    border: 1px solid transparent; cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary {
    background: var(--wp-blue); color: white;
    box-shadow: 0 8px 20px -8px rgba(33,117,155,0.7);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 24px -8px rgba(33,117,155,0.7); }
  .btn-ghost { background: white; color: var(--ink); border-color: #d9e3ea; }
  .btn-ghost:hover { border-color: var(--wp-blue); color: var(--wp-blue); }

  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-height: 660px;
    display: flex; align-items: center; justify-content: center;
  }
  .stage svg {
    width: 100%; height: 100%; display: block; overflow: visible;
  }

  /* ============ Animations ============ */
  @keyframes spin-slow      { to { transform: rotate(360deg); } }
  @keyframes spin-rev       { to { transform: rotate(-360deg); } }
  @keyframes float-y        { 0%,100% { transform: translate3d(0,0,0); } 50% { transform: translate3d(0,-8px,0); } }
  @keyframes float-y-soft   { 0%,100% { transform: translate3d(0,0,0); } 50% { transform: translate3d(0,-4px,0); } }
  @keyframes wobble-tilt    {
    0%,100% { transform: rotate(-1.2deg); }
    50%     { transform: rotate(1.2deg); }
  }
  @keyframes dash-flow      { to { stroke-dashoffset: -48; } }
  @keyframes dash-flow-rev  { to { stroke-dashoffset: 48; } }
  @keyframes packet-fly {
    0%   { offset-distance: 0%;   opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  @keyframes pulse-ring {
    0%   { transform: scale(0.5); opacity: 0.7; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  @keyframes blink {
    0%, 88%, 100% { opacity: 1; }
    92%, 96%      { opacity: 0.25; }
  }
  @keyframes type-bar {
    0%, 100% { transform: scaleX(0.3); }
    50%      { transform: scaleX(1); }
  }
  @keyframes piston {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  @keyframes block-shift {
    0%, 18%   { transform: translate3d(0, 0, 0); }
    32%, 60%  { transform: translate3d(8px, -10px, 0); }
    74%, 100% { transform: translate3d(0, 0, 0); }
  }
  @keyframes block-shift-rev {
    0%, 18%   { transform: translate3d(0, 0, 0); }
    32%, 60%  { transform: translate3d(-8px, 10px, 0); }
    74%, 100% { transform: translate3d(0, 0, 0); }
  }
  @keyframes shimmer-x {
    0%   { transform: translateX(-80px); }
    100% { transform: translateX(280px); }
  }
  @keyframes pop-dot {
    0%, 100% { opacity: 0.35; transform: scale(0.9); }
    50%      { opacity: 1;    transform: scale(1.05); }
  }
  @keyframes wire-highlight {
    0%, 100% { stroke-opacity: 0.15; }
    50%      { stroke-opacity: 0.85; }
  }
  @keyframes terminal-cursor {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  @keyframes scroll-rows {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-22px); }
    100% { transform: translateY(0); }
  }
  @keyframes graph-grow {
    0%   { transform: scaleY(0.3); }
    50%  { transform: scaleY(1); }
    100% { transform: scaleY(0.3); }
  }

  .anim-spin       { animation: spin-slow 28s linear infinite; transform-origin: center; transform-box: fill-box; }
  .anim-spin-rev   { animation: spin-rev 36s linear infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-y    { animation: float-y 6s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-soft { animation: float-y-soft 5s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-wobble     { animation: wobble-tilt 7s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-dash       { stroke-dasharray: 6 6; animation: dash-flow 2.2s linear infinite; }
  .anim-dash-rev   { stroke-dasharray: 6 6; animation: dash-flow-rev 2.2s linear infinite; }
  .anim-pulse-ring { animation: pulse-ring 3.2s cubic-bezier(.25,.6,.35,1) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-blink      { animation: blink 4s ease-in-out infinite; }
  .anim-type       { transform-origin: left center; transform-box: fill-box; animation: type-bar 2.4s cubic-bezier(.34,.01,.21,1) infinite; }
  .anim-piston     { animation: piston 1.8s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-block-a    { animation: block-shift 6s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-block-b    { animation: block-shift-rev 6s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-shimmer    { animation: shimmer-x 4.5s ease-in-out infinite; }
  .anim-dot        { animation: pop-dot 3s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-wire       { animation: wire-highlight 3s ease-in-out infinite; }
  .anim-cursor     { animation: terminal-cursor 1.1s steps(2,end) infinite; }
  .anim-scroll-rows{ animation: scroll-rows 6s cubic-bezier(.45,.05,.55,.95) infinite; }
  .anim-graph      { transform-origin: bottom center; transform-box: fill-box; animation: graph-grow 3.4s cubic-bezier(.34,.01,.21,1) infinite; }

  .packet-1 { offset-path: path('M 168 280 C 200 240, 260 220, 280 192'); animation: packet-fly 3.4s cubic-bezier(.34,.01,.21,1) infinite; }
  .packet-2 { offset-path: path('M 392 280 C 360 240, 300 220, 280 192'); animation: packet-fly 3.4s cubic-bezier(.34,.01,.21,1) infinite; animation-delay: -1.1s; }
  .packet-3 { offset-path: path('M 168 380 C 200 420, 260 440, 280 470'); animation: packet-fly 3.4s cubic-bezier(.34,.01,.21,1) infinite; animation-delay: -2.2s; }
  .packet-4 { offset-path: path('M 392 380 C 360 420, 300 440, 280 470'); animation: packet-fly 3.4s cubic-bezier(.34,.01,.21,1) infinite; animation-delay: -0.6s; }

  .stage svg, .stage svg text {
    text-rendering: geometricPrecision;
    shape-rendering: geometricPrecision;
  }

  @media (prefers-reduced-motion: reduce) {
    [class*="anim-"], [class^="packet-"] { animation: none; }
  }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; padding: 32px 20px 60px; }
    .hero-copy { order: 2; }
    .stage { order: 1; max-height: 520px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-copy">
    <span class="hero-num">№ 02</span>
    <div><span class="eyebrow">WordPress · Custom Web Apps</span></div>
    <h1>Custom<br>Web <span class="grad">Applications</span></h1>
    <p>Custom web apps built around how you work. We model your domain, wire up the data, and ship a tool that bends to your process — not the other way around.</p>
    <div class="hero-cta">
      <button class="btn btn-primary">Scope my app</button>
      <button class="btn btn-ghost">See case studies</button>
    </div>
  </div>

  <div class="stage" aria-label="A custom-built web application diagram with a central app window, connected modules, an animated workflow blueprint, and live data panels">
    <svg viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg" role="img">
      <defs>
        <!-- Window chrome gradient -->
        <linearGradient id="appHeader" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#21759b"/>
          <stop offset="100%" stop-color="#7c6cf2"/>
        </linearGradient>
        <linearGradient id="appBody" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f3f8fb"/>
        </linearGradient>

        <!-- Module gradients -->
        <linearGradient id="modBlue"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5fb1d4"/><stop offset="100%" stop-color="#21759b"/></linearGradient>
        <linearGradient id="modViolet" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9d8ff8"/><stop offset="100%" stop-color="#7c6cf2"/></linearGradient>
        <linearGradient id="modMint"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7ee0bf"/><stop offset="100%" stop-color="#3fb98d"/></linearGradient>
        <linearGradient id="modAmber"  x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffd06b"/><stop offset="100%" stop-color="#f5a623"/></linearGradient>

        <!-- Soft glow -->
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#7c6cf2" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#7c6cf2" stop-opacity="0"/>
        </radialGradient>

        <!-- Shimmer -->
        <linearGradient id="shimmerGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="white" stop-opacity="0"/>
          <stop offset="50%" stop-color="white" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>

        <!-- Blueprint grid -->
        <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#cfdde5" stroke-width="0.5" opacity="0.6"/>
        </pattern>

        <!-- Clip for app body -->
        <clipPath id="appClip"><rect x="208" y="222" width="144" height="116" rx="8"/></clipPath>
      </defs>

      <!-- =====================================================
           BLUEPRINT BACKDROP — soft grid, glow, orbital guides
           ===================================================== -->
      <rect x="40" y="40" width="480" height="480" rx="28" fill="url(#grid)" opacity="0.7"/>
      <circle cx="280" cy="280" r="240" fill="url(#centerGlow)"/>

      <!-- Schematic frame corners (engineering blueprint feel) -->
      <g stroke="#7c6cf2" stroke-width="1.4" fill="none" opacity="0.55" stroke-linecap="round">
        <path d="M 40 70 V 40 H 70"/>
        <path d="M 490 40 H 520 V 70"/>
        <path d="M 520 490 V 520 H 490"/>
        <path d="M 70 520 H 40 V 490"/>
      </g>

      <!-- Orbital dotted ring -->
      <circle cx="280" cy="280" r="220" fill="none" stroke="#cfdde5" stroke-width="1" stroke-dasharray="2 6" opacity="0.7"/>
      <circle cx="280" cy="280" r="178" fill="none" stroke="#cfdde5" stroke-width="1" stroke-dasharray="2 6" opacity="0.55"/>

      <!-- =====================================================
           CONNECTIVE WIRES (under the modules) — schematic feel
           ===================================================== -->
      <g fill="none" stroke-linecap="round">
        <!-- top-left module -> app -->
        <path d="M 110 168 L 168 168 Q 188 168, 208 192 L 232 222"
              stroke="#21759b" stroke-width="2" opacity="0.25"/>
        <path d="M 110 168 L 168 168 Q 188 168, 208 192 L 232 222"
              class="anim-dash" stroke="#21759b" stroke-width="2"/>

        <!-- top-right module -> app -->
        <path d="M 450 168 L 392 168 Q 372 168, 352 192 L 328 222"
              stroke="#7c6cf2" stroke-width="2" opacity="0.25"/>
        <path d="M 450 168 L 392 168 Q 372 168, 352 192 L 328 222"
              class="anim-dash" style="animation-delay:.4s" stroke="#7c6cf2" stroke-width="2"/>

        <!-- bottom-left module -> app -->
        <path d="M 110 432 L 168 432 Q 188 432, 208 412 L 232 388"
              stroke="#3fb98d" stroke-width="2" opacity="0.25"/>
        <path d="M 110 432 L 168 432 Q 188 432, 208 412 L 232 388"
              class="anim-dash-rev" stroke="#3fb98d" stroke-width="2"/>

        <!-- bottom-right module -> app -->
        <path d="M 450 432 L 392 432 Q 372 432, 352 412 L 328 388"
              stroke="#f5a623" stroke-width="2" opacity="0.25"/>
        <path d="M 450 432 L 392 432 Q 372 432, 352 412 L 328 388"
              class="anim-dash-rev" style="animation-delay:.6s" stroke="#f5a623" stroke-width="2"/>

        <!-- Wire bus rails (left + right) — schematic backbone -->
        <path d="M 64 168 H 110" stroke="#cfdde5" stroke-width="2"/>
        <path d="M 64 432 H 110" stroke="#cfdde5" stroke-width="2"/>
        <path d="M 450 168 H 496" stroke="#cfdde5" stroke-width="2"/>
        <path d="M 450 432 H 496" stroke="#cfdde5" stroke-width="2"/>
        <!-- Highlighted overlays -->
        <path d="M 64 168 H 110" class="anim-wire" stroke="#7c6cf2" stroke-width="2"/>
        <path d="M 64 432 H 110" class="anim-wire" style="animation-delay:.7s" stroke="#3fb98d" stroke-width="2"/>
        <path d="M 450 168 H 496" class="anim-wire" style="animation-delay:1.4s" stroke="#21759b" stroke-width="2"/>
        <path d="M 450 432 H 496" class="anim-wire" style="animation-delay:.3s" stroke="#f5a623" stroke-width="2"/>

        <!-- Solder dots at connection points -->
        <g fill="#ffffff" stroke="#0e2230" stroke-width="1.2">
          <circle cx="110" cy="168" r="3.4"/>
          <circle cx="450" cy="168" r="3.4"/>
          <circle cx="110" cy="432" r="3.4"/>
          <circle cx="450" cy="432" r="3.4"/>
          <circle cx="232" cy="222" r="3"/>
          <circle cx="328" cy="222" r="3"/>
          <circle cx="232" cy="388" r="3"/>
          <circle cx="328" cy="388" r="3"/>
        </g>
      </g>

      <!-- =====================================================
           CENTER: THE APP WINDOW
           Fixed window with a header, sidebar, body that has live UI
           ===================================================== -->
      <g>
        <!-- Drop shadow -->
        <rect x="200" y="206" width="160" height="148" rx="12" fill="#0c4a63" opacity="0.12"/>
        <!-- Card -->
        <rect x="196" y="200" width="160" height="148" rx="12" fill="url(#appBody)" stroke="#cfdde5" stroke-width="1.2"/>

        <!-- Header bar -->
        <rect x="196" y="200" width="160" height="22" rx="12" fill="url(#appHeader)"/>
        <rect x="196" y="210" width="160" height="12" fill="url(#appHeader)"/>
        <!-- Window dots -->
        <circle cx="206" cy="211" r="2.4" fill="#ffffff" opacity="0.95"/>
        <circle cx="214" cy="211" r="2.4" fill="#ffffff" opacity="0.65"/>
        <circle cx="222" cy="211" r="2.4" fill="#ffffff" opacity="0.4"/>
        <!-- Title bars -->
        <rect x="244" y="207" width="58" height="4" rx="2" fill="#ffffff" opacity="0.95"/>
        <rect x="244" y="214" width="38" height="3" rx="1.5" fill="#ffffff" opacity="0.55"/>
        <!-- Live dot -->
        <g transform="translate(346 211)">
          <circle r="3" fill="#4fd1a8"/>
          <circle r="3" fill="#4fd1a8" opacity="0.4">
            <animate attributeName="r" values="3;7;3" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- Sidebar -->
        <rect x="196" y="222" width="36" height="126" rx="0" fill="#eef7fc"/>
        <rect x="196" y="346" width="36" height="2"  fill="#cfdde5"/>
        <!-- Sidebar items -->
        <g>
          <!-- active -->
          <rect x="200" y="232" width="28" height="14" rx="3" fill="#7c6cf2" opacity="0.18"/>
          <rect x="204" y="237" width="4"  height="4"  rx="1" fill="#7c6cf2"/>
          <rect x="212" y="238" width="14" height="2.4" rx="1.2" fill="#7c6cf2"/>
          <!-- inactive items -->
          <rect x="204" y="254" width="4" height="4" rx="1" fill="#0e2230" opacity="0.55"/>
          <rect x="212" y="255" width="14" height="2.4" rx="1.2" fill="#0e2230" opacity="0.55"/>

          <rect x="204" y="268" width="4" height="4" rx="1" fill="#0e2230" opacity="0.55"/>
          <rect x="212" y="269" width="12" height="2.4" rx="1.2" fill="#0e2230" opacity="0.55"/>

          <rect x="204" y="282" width="4" height="4" rx="1" fill="#0e2230" opacity="0.55"/>
          <rect x="212" y="283" width="14" height="2.4" rx="1.2" fill="#0e2230" opacity="0.55"/>

          <rect x="204" y="296" width="4" height="4" rx="1" fill="#0e2230" opacity="0.55"/>
          <rect x="212" y="297" width="10" height="2.4" rx="1.2" fill="#0e2230" opacity="0.55"/>

          <rect x="204" y="310" width="4" height="4" rx="1" fill="#0e2230" opacity="0.55"/>
          <rect x="212" y="311" width="14" height="2.4" rx="1.2" fill="#0e2230" opacity="0.55"/>
        </g>
        <!-- Sidebar bottom avatar -->
        <circle cx="214" cy="332" r="4.5" fill="#ffb74a"/>
        <rect x="208" y="338" width="14" height="2" rx="1" fill="#0e2230" opacity="0.6"/>

        <!-- Body content (clipped) -->
        <g clip-path="url(#appClip)">
          <!-- Top toolbar inside body -->
          <rect x="232" y="222" width="120" height="14" fill="#ffffff"/>
          <rect x="232" y="236" width="120" height="1" fill="#eef3f6"/>
          <rect x="240" y="226" width="34" height="6" rx="3" fill="#0e2230"/>
          <rect x="280" y="227" width="20" height="4" rx="2" fill="#cfdde5"/>
          <rect x="304" y="227" width="14" height="4" rx="2" fill="#cfdde5"/>
          <!-- right-side action button -->
          <rect x="324" y="225" width="22" height="8" rx="4" fill="#7c6cf2"/>
          <rect x="328" y="228" width="14" height="2" rx="1" fill="#ffffff"/>

          <!-- Two-pane body: data table + side metric -->
          <!-- Table column headers -->
          <g transform="translate(238 244)">
            <rect x="0"  y="0" width="22" height="3" rx="1.5" fill="#0e2230" opacity="0.75"/>
            <rect x="32" y="0" width="22" height="3" rx="1.5" fill="#0e2230" opacity="0.75"/>
            <rect x="64" y="0" width="14" height="3" rx="1.5" fill="#0e2230" opacity="0.75"/>
          </g>
          <!-- Scrolling rows -->
          <g class="anim-scroll-rows">
            <g transform="translate(238 252)">
              <!-- row 1 -->
              <rect x="0"  y="0"  width="22" height="3" rx="1.5" fill="#cfdde5"/>
              <rect x="32" y="0"  width="22" height="3" rx="1.5" fill="#cfdde5"/>
              <rect x="64" y="-2" width="14" height="6" rx="3"   fill="#3fb98d" opacity="0.25"/>
              <circle cx="68" cy="1" r="1.2" fill="#3fb98d"/>
              <rect x="72" y="0" width="6" height="3" rx="1.5" fill="#3fb98d"/>
              <!-- row 2 -->
              <rect x="0"  y="8"  width="22" height="3" rx="1.5" fill="#cfdde5"/>
              <rect x="32" y="8"  width="18" height="3" rx="1.5" fill="#cfdde5"/>
              <rect x="64" y="6"  width="14" height="6" rx="3"   fill="#ffb74a" opacity="0.25"/>
              <circle cx="68" cy="9" r="1.2" fill="#f5a623"/>
              <rect x="72" y="8" width="6" height="3" rx="1.5" fill="#f5a623"/>
              <!-- row 3 -->
              <rect x="0"  y="16" width="22" height="3" rx="1.5" fill="#cfdde5"/>
              <rect x="32" y="16" width="20" height="3" rx="1.5" fill="#cfdde5"/>
              <rect x="64" y="14" width="14" height="6" rx="3"   fill="#7c6cf2" opacity="0.25"/>
              <circle cx="68" cy="17" r="1.2" fill="#7c6cf2"/>
              <rect x="72" y="16" width="6" height="3" rx="1.5" fill="#7c6cf2"/>
              <!-- row 4 -->
              <rect x="0"  y="24" width="22" height="3" rx="1.5" fill="#cfdde5"/>
              <rect x="32" y="24" width="14" height="3" rx="1.5" fill="#cfdde5"/>
              <rect x="64" y="22" width="14" height="6" rx="3"   fill="#3fb98d" opacity="0.25"/>
              <circle cx="68" cy="25" r="1.2" fill="#3fb98d"/>

              <!-- row 5 -->
              <rect x="0"  y="32" width="22" height="3" rx="1.5" fill="#cfdde5"/>
              <rect x="32" y="32" width="18" height="3" rx="1.5" fill="#cfdde5"/>
              <rect x="64" y="30" width="14" height="6" rx="3"   fill="#ff6b5b" opacity="0.25"/>
              <circle cx="68" cy="33" r="1.2" fill="#ff6b5b"/>
              <rect x="72" y="32" width="6" height="3" rx="1.5" fill="#ff6b5b"/>
              <!-- row 6 -->

          </g>

          <!-- Bottom strip: tiny chart -->
          <g transform="translate(238 320)">
            <rect x="0" y="0" width="108" height="14" rx="3" fill="#eef7fc"/>
            <g fill="#21759b">
              <rect class="anim-graph" x="2"  y="2" width="6" height="10" rx="1" style="animation-delay:0s;"/>
              <rect class="anim-graph" x="12" y="2" width="6" height="10" rx="1" style="animation-delay:.2s;"/>
              <rect class="anim-graph" x="22" y="2" width="6" height="10" rx="1" style="animation-delay:.4s;"/>
              <rect class="anim-graph" x="32" y="2" width="6" height="10" rx="1" style="animation-delay:.6s;"/>
              <rect class="anim-graph" x="42" y="2" width="6" height="10" rx="1" style="animation-delay:.8s;"/>
              <rect class="anim-graph" x="52" y="2" width="6" height="10" rx="1" style="animation-delay:1s;"/>
              <rect class="anim-graph" x="62" y="2" width="6" height="10" rx="1" style="animation-delay:1.2s;"/>
              <rect class="anim-graph" x="72" y="2" width="6" height="10" rx="1" style="animation-delay:1.4s;"/>
              <rect class="anim-graph" x="82" y="2" width="6" height="10" rx="1" style="animation-delay:1.6s;"/>
              <rect class="anim-graph" x="92" y="2" width="6" height="10" rx="1" style="animation-delay:1.8s;"/>
            </g>
          </g>
        </g>

        <!-- Shimmer sweep across the app -->
        <g clip-path="url(#appClip)">
          <rect class="anim-shimmer" x="100" y="220" width="60" height="120" fill="url(#shimmerGrad)" opacity="0.55"/>
        </g>

        <!-- Cursor on right action button -->
        <g transform="translate(338 232)">
          <path class="anim-piston" d="M 0 0 L 8 3 L 4 5 L 3 9 Z"

        </g>
      </g>

      <!-- =====================================================
           ORBITING ENGINEERING SCHEMATIC RING
           Pulse rings + a thin outline to keep the app visually anchored
           ===================================================== -->
      <g transform="translate(280 280)">
        <circle class="anim-pulse-ring" r="100" fill="none" stroke="#7c6cf2" stroke-width="1.4" opacity="0.5"/>
        <circle class="anim-pulse-ring" style="animation-delay:1.6s" r="100" fill="none" stroke="#21759b" stroke-width="1.4" opacity="0.5"/>
      </g>

      <!-- =====================================================
           4 MODULES — distinct: API endpoint, Database, Auth, Integration
           Top-left:  API endpoint  (blue)
           Top-right: Auth / Identity (violet)
           Bot-left:  Database     (mint)
           Bot-right: Integrations (amber)
           ===================================================== -->

      <!-- ============= API endpoint module (top-left) ============= -->
      <g class="anim-float-y">
        <g transform="translate(70 168)">
          <rect x="-44" y="-34" width="88" height="68" rx="12" fill="#ffffff" stroke="#cfdde5"/>
          <!-- header chip -->
          <rect x="-38" y="-28" width="38" height="10" rx="5" fill="url(#modBlue)"/>
          <rect x="-34" y="-24" width="6"  height="2" rx="1" fill="#ffffff"/>
          <rect x="-26" y="-24" width="20" height="2" rx="1" fill="#ffffff" opacity="0.85"/>
          <!-- API rows -->
          <g transform="translate(-38 -10)">
            <!-- GET row -->
            <rect x="0"  y="0" width="76" height="10" rx="3" fill="#eef7fc"/>
            <rect x="3"  y="3" width="14" height="4" rx="1.5" fill="#3fb98d"/>
            <rect x="20" y="3" width="50" height="2" rx="1"   fill="#0e2230" opacity="0.75"/>
            <rect x="20" y="6" width="34" height="1.4" rx="0.7" fill="#0e2230" opacity="0.45"/>
            <!-- POST row -->
            <rect x="0"  y="14" width="76" height="10" rx="3" fill="#eef7fc"/>
            <rect x="3"  y="17" width="14" height="4" rx="1.5" fill="#ffb74a"/>
            <rect x="20" y="17" width="44" height="2" rx="1"   fill="#0e2230" opacity="0.75"/>
            <rect x="20" y="20" width="36" height="1.4" rx="0.7" fill="#0e2230" opacity="0.45"/>
            <!-- DELETE row -->
            <rect x="0"  y="28" width="76" height="10" rx="3" fill="#eef7fc"/>
            <rect x="3"  y="31" width="14" height="4" rx="1.5" fill="#ff6b5b"/>
            <rect x="20" y="31" width="38" height="2" rx="1"   fill="#0e2230" opacity="0.75"/>
            <rect x="20" y="34" width="30" height="1.4" rx="0.7" fill="#0e2230" opacity="0.45"/>
          </g>
        </g>
      </g>

      <!-- ============= AUTH / IDENTITY module (top-right) ============= -->
      <g class="anim-float-y" style="animation-delay:-1.5s;">
        <g transform="translate(490 168)">
          <rect x="-44" y="-34" width="88" height="68" rx="12" fill="#ffffff" stroke="#cfdde5"/>
          <!-- header chip -->
          <rect x="-38" y="-28" width="38" height="10" rx="5" fill="url(#modViolet)"/>
          <g transform="translate(-34 -23)" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round">
            <path d="M 0 0 V 4 M -3 4 H 3"/>
            <circle cx="0" cy="-1.5" r="1.5"/>
          </g>
          <rect x="-22" y="-24" width="20" height="2" rx="1" fill="#ffffff" opacity="0.85"/>

          <!-- Big shield icon -->

            <path d="M 0 -16 L 14 -10 V 0 Q 14 12 0 18 Q -14 12 -14 0 V -10 Z"

          </g>

      <!-- ============= DATABASE module (bottom-left) ============= -->

          <rect x="-22" y="-24" width="22" height="2" rx="1" fill="#ffffff" opacity="0.85"/>

          </rect>
        </g>
      </g>

      <!-- ============= INTEGRATIONS module (bottom-right) ============= -->
      <g class="anim-float-y" style="animation-delay:-4.5s;">
        <g transform="translate(490 432)">
          <rect x="-44" y="-34" width="88" height="68" rx="12" fill="#ffffff" stroke="#cfdde5"/>

      <!-- =====================================================

      <!-- =====================================================
           METRIC SPARKLINE CARD (bottom-center) — live ops dashboard
           ===================================================== -->
      <g transform="translate(280 478)">
        <g class="anim-float-soft" style="animation-delay:-2s;">
          <rect x="-90" y="-28" width="180" height="56" rx="10" fill="#ffffff" stroke="#cfdde5"/>

          <g transform="translate(-78 -12)">
            <circle cx="0" cy="0" r="2.6" fill="#4fd1a8"/>

              <animate attributeName="r" values="2.6;6;2.6" dur="2s" repeatCount="indefinite"/>

            </circle>
            <rect x="6" y="-2" width="26" height="3" rx="1.5" fill="#0e2230"/>
            <rect x="6" y="4"  width="44" height="2.4" rx="1.2" fill="#0e2230" opacity="0.45"/>

          <!-- big number bars -->
          <g transform="translate(-78 8)" class="anim-blink">
            <rect x="0"  y="0" width="14" height="12" rx="2" fill="#0e2230"/>
            <rect x="16" y="0" width="6"  height="12" rx="2" fill="#0e2230"/>
            <rect x="24" y="0" width="14" height="12" rx="2" fill="#7c6cf2"/>
          </g>
          <!-- right: sparkline chart -->
          <g transform="translate(-12 0)">
            <rect x="0" y="-18" width="98" height="34" rx="6" fill="#eef7fc"/>
            <!-- gridlines -->

            <!-- sparkline path with growing dasharray -->
            <path d="M 4 8 L 14 4 L 24 0 L 34 6 L 44 -4 L 54 2 L 64 -6 L 74 -2 L 84 -8 L 94 -10"

              <animate attributeName="stroke-dasharray" values="0 200;200 0;0 200" dur="6s" repeatCount="indefinite"/>

            <!-- end dot -->
            <circle cx="94" cy="-10" r="2.4" fill="#21759b"/>

              <animate attributeName="r" values="2.4;6;2.4" dur="2s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
            </circle>
          </g>
        </g>
      </g>

      <!-- =====================================================
           Spinning gears — engineering atmosphere (top-right corner)
           ===================================================== -->
      <g transform="translate(498 88)">
        <g class="anim-spin">
          <circle r="20" fill="#ffffff" stroke="#cfdde5" stroke-width="1.4"/>
          <circle r="8" fill="#21759b"/>
          <circle r="3.4" fill="#0c4a63"/>
          <g fill="#21759b">
            <rect x="-2.4" y="-26" width="4.8" height="7" rx="1.5"/>
            <rect x="-2.4" y="19"  width="4.8" height="7" rx="1.5"/>
            <rect x="-26"  y="-2.4" width="7" height="4.8" rx="1.5"/>
            <rect x="19"   y="-2.4" width="7" height="4.8" rx="1.5"/>
            <rect x="-21" y="-21" width="7" height="4.8" rx="1.5" transform="rotate(45)"/>
            <rect x="14"  y="-21" width="7" height="4.8" rx="1.5" transform="rotate(45)"/>
            <rect x="-21" y="16"  width="7" height="4.8" rx="1.5" transform="rotate(45)"/>
            <rect x="14"  y="16"  width="7" height="4.8" rx="1.5" transform="rotate(45)"/>
          </g>
        </g>
      </g>
      <g transform="translate(60 480)">
        <g class="anim-spin-rev">
          <circle r="14" fill="#ffffff" stroke="#cfdde5" stroke-width="1.4"/>
          <circle r="5"  fill="#7c6cf2"/>
          <g fill="#7c6cf2">
            <rect x="-1.8" y="-18" width="3.6" height="5" rx="1.2"/>
            <rect x="-1.8" y="13"  width="3.6" height="5" rx="1.2"/>
            <rect x="-18"  y="-1.8" width="5" height="3.6" rx="1.2"/>
            <rect x="13"   y="-1.8" width="5" height="3.6" rx="1.2"/>
            <rect x="-15"  y="-15" width="5" height="3.6" rx="1.2" transform="rotate(45)"/>
            <rect x="10"   y="-15" width="5" height="3.6" rx="1.2" transform="rotate(45)"/>
            <rect x="-15"  y="11"  width="5" height="3.6" rx="1.2" transform="rotate(45)"/>
            <rect x="10"   y="11"  width="5" height="3.6" rx="1.2" transform="rotate(45)"/>
          </g>
        </g>
      </g>

      <!-- Ambient accent dots -->
      <g>
        <circle class="anim-dot" cx="60"  cy="280" r="2.6" fill="#21759b"/>
        <circle class="anim-dot" style="animation-delay:.4s" cx="500" cy="280" r="2.6" fill="#7c6cf2"/>
        <circle class="anim-dot" style="animation-delay:.8s" cx="280" cy="40"  r="2.6" fill="#3fb98d"/>
        <circle class="anim-dot" style="animation-delay:1.2s" cx="280" cy="540" r="2.6" fill="#ff6b5b"/>

    </svg>
  </div>
