<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Local Business Sites — Hero Vector</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --wp-blue: #21759b;
    --wp-blue-deep: #135e7c;
    --wp-blue-darker: #0c4a63;
    --wp-blue-light: #4a9bc4;
    --wp-blue-soft: #d6ecf6;
    --ink: #0e2230;
    --ink-soft: #1c3a4f;
    --accent-coral: #ff6b5b;
    --accent-amber: #ffb74a;
    --accent-mint: #4fd1a8;
    --accent-violet: #7c6cf2;
    --accent-pink: #ef6ea8;
    --paper:    #fff8ec;
    --paper-2:  #fff2dc;
    --warm-ink: #2a1f17;
    --terracotta: #d27b4f;
    --olive: #6b8e4e;
    --sky:   #6fb3d9;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background: #ffffff;
    color: var(--ink);
    min-height: 100vh;
  }

  .hero {
    max-width: 1340px;
    margin: 0 auto;
    padding: 56px 48px 80px;
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 48px;
    align-items: center;
    min-height: 100vh;
  }

  .hero-copy .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--wp-blue);
    background: var(--wp-blue-soft);
    padding: 6px 12px; border-radius: 999px;
  }
  .hero-copy .eyebrow::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-mint);
    box-shadow: 0 0 0 4px rgba(79, 209, 168, 0.2);
  }
  .hero-copy h1 {
    font-size: clamp(40px, 5vw, 68px);
    line-height: 1.02;
    letter-spacing: -0.028em;
    font-weight: 800;
    margin: 18px 0 18px;
    text-wrap: pretty;
    color: var(--ink);
  }
  .hero-copy h1 .grad {
    background: linear-gradient(120deg, var(--wp-blue) 0%, var(--accent-violet) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero-copy p {
    font-size: 18px; line-height: 1.55;
    color: var(--ink-soft);
    max-width: 52ch; margin: 0 0 28px;
  }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    font: inherit; font-weight: 600; font-size: 15px;
    padding: 14px 22px; border-radius: 12px;
    border: 1px solid transparent; cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary {
    background: var(--wp-blue); color: white;
    box-shadow: 0 8px 20px -8px rgba(33,117,155,0.7);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 24px -8px rgba(33,117,155,0.7); }
  .btn-ghost { background: white; color: var(--ink); border-color: #d9e3ea; }
  .btn-ghost:hover { border-color: var(--wp-blue); color: var(--wp-blue); }

  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-height: 660px;
    display: flex; align-items: center; justify-content: center;
  }
  .stage svg {
    width: 100%; height: 100%; display: block; overflow: visible;
  }

  /* Animations — gentle but distinct: pin-drop, sway, hand-wave, steam */
  @keyframes pin-drop {
    0%   { transform: translate3d(0, -28px, 0); opacity: 0; }
    20%  { transform: translate3d(0, 0, 0);     opacity: 1; }
    32%  { transform: translate3d(0, -8px, 0); }
    44%  { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(0, 0, 0);     opacity: 1; }
  }
  @keyframes pin-shadow {
    0%, 18%  { transform: scale(0.4); opacity: 0.15; }
    22%      { transform: scale(1.15); opacity: 0.45; }
    36%      { transform: scale(1);    opacity: 0.32; }
    100%     { transform: scale(1);    opacity: 0.32; }
  }
  @keyframes sway-a {
    0%, 100% { transform: rotate(-1.5deg); }
    50%      { transform: rotate(1.5deg); }
  }
  @keyframes sway-b {
    0%, 100% { transform: rotate(1.5deg); }
    50%      { transform: rotate(-2deg); }
  }
  @keyframes float-y {
    0%, 100% { transform: translate3d(0, 0, 0); }
    50%      { transform: translate3d(0, -6px, 0); }
  }
  @keyframes steam-rise {
    0%   { transform: translate3d(0, 0, 0)  scale(1);   opacity: 0; }
    20%  { opacity: 0.8; }
    100% { transform: translate3d(0, -22px, 0) scale(1.6); opacity: 0; }
  }
  @keyframes hand-wave {
    0%, 100% { transform: rotate(-12deg); }
    50%      { transform: rotate(14deg); }
  }
  @keyframes ring-pulse {
    0%   { transform: scale(0.4); opacity: 0.55; }
    80%  { opacity: 0.05; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  @keyframes star-twinkle {
    0%, 60%, 100% { opacity: 0.85; transform: scale(1); }
    72%           { opacity: 1;    transform: scale(1.18); }
    84%           { opacity: 0.85; transform: scale(1); }
  }
  @keyframes dash-flow { to { stroke-dashoffset: -48; } }
  @keyframes path-trace {
    0%   { stroke-dashoffset: 360; }
    50%  { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: -360; }
  }
  @keyframes traveler {
    0%   { offset-distance: 0%; }
    100% { offset-distance: 100%; }
  }
  @keyframes door-bell {
    0%, 88%, 100% { transform: rotate(0); }
    92%           { transform: rotate(-8deg); }
    96%           { transform: rotate(6deg); }
  }
  @keyframes bird-flap {
    0%, 100% { d: path('M -6 0 Q -3 -4 0 0 Q 3 -4 6 0'); }
    50%      { d: path('M -6 0 Q -3 4 0 0 Q 3 4 6 0'); }
  }
  @keyframes cloud-drift {
    0%   { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(20px, 0, 0); }
  }

  .anim-pin       { animation: pin-drop 5s cubic-bezier(.34,.01,.21,1) infinite; transform-origin: center bottom; transform-box: fill-box; }
  .anim-pin-shadow{ animation: pin-shadow 5s cubic-bezier(.34,.01,.21,1) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-sway-a    { animation: sway-a 5s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center bottom; transform-box: fill-box; }
  .anim-sway-b    { animation: sway-b 6.5s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center bottom; transform-box: fill-box; }
  .anim-float-y   { animation: float-y 6s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-steam     { animation: steam-rise 3.4s cubic-bezier(.34,.01,.21,1) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-hand      { animation: hand-wave 1.8s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: 0 0; transform-box: fill-box; }
  .anim-ring      { animation: ring-pulse 3.4s cubic-bezier(.25,.6,.35,1) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-star      { animation: star-twinkle 3.4s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-dash      { stroke-dasharray: 6 6; animation: dash-flow 2.2s linear infinite; }
  .anim-trace     { stroke-dasharray: 360; stroke-dashoffset: 360; animation: path-trace 6s cubic-bezier(.45,.05,.55,.95) infinite; }
  .anim-bell      { animation: door-bell 4s cubic-bezier(.34,.01,.21,1) infinite; transform-origin: center top; transform-box: fill-box; }
  .anim-cloud     { animation: cloud-drift 14s ease-in-out infinite alternate; transform-origin: center; transform-box: fill-box; }

  .traveler {
    offset-path: path('M 116 410 C 160 360, 220 380, 280 320');
    animation: traveler 5s cubic-bezier(.45,.05,.55,.95) infinite;
    will-change: offset-distance;
  }

  .anim-pin, .anim-pin-shadow, .anim-sway-a, .anim-sway-b, .anim-float-y,
  .anim-steam, .anim-hand, .anim-ring, .anim-star, .anim-dash, .anim-trace,
  .anim-bell, .anim-cloud, .traveler {
    will-change: transform, opacity;
    backface-visibility: hidden;
  }

  .stage svg, .stage svg text {
    text-rendering: geometricPrecision;
    shape-rendering: geometricPrecision;
  }

  @media (prefers-reduced-motion: reduce) {
    .anim-pin, .anim-pin-shadow, .anim-sway-a, .anim-sway-b, .anim-float-y,
    .anim-steam, .anim-hand, .anim-ring, .anim-star, .anim-dash, .anim-trace,
    .anim-bell, .anim-cloud, .traveler { animation: none; }
  }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; padding: 32px 20px 60px; }
    .hero-copy { order: 2; }
    .stage { order: 1; max-height: 520px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-copy">
    <span class="eyebrow">WordPress · Local Business</span>
    <h1>Local Business<br><span class="grad">Sites</span></h1>
    <p>A site that actually represents your business. Built with the warmth of your storefront, the clarity of your hours, and the directions your neighbors are searching for right now.</p>
    <div class="hero-cta">
      <button class="btn btn-primary">Build my site</button>
      <button class="btn btn-ghost">See examples</button>
    </div>
  </div>

  <div class="stage" aria-label="A friendly hand-drawn street scene with a local cafe storefront, a map pin, and floating review and hours cards">
    <svg viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg" role="img">
      <defs>
        <!-- Ground / paving -->
        <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#e6f0f5"/>
          <stop offset="100%" stop-color="#cfdde5"/>
        </linearGradient>
        <!-- Storefront wall -->
        <linearGradient id="storeWall" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#eef7fc"/>
        </linearGradient>
        <!-- Awning: WP blue -> violet (matches header gradient elsewhere in series) -->
        <linearGradient id="awning" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#21759b"/>
          <stop offset="100%" stop-color="#7c6cf2"/>
        </linearGradient>
        <linearGradient id="awningStripe" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0.4"/>
        </linearGradient>
        <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#d6ecf6"/>
          <stop offset="100%" stop-color="#a9d2e8"/>
        </linearGradient>
        <linearGradient id="door" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#1c3a4f"/>
          <stop offset="100%" stop-color="#0c4a63"/>
        </linearGradient>
        <!-- Pin: coral (the series accent) -->
        <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#ff8a7d"/>
          <stop offset="100%" stop-color="#ff6b5b"/>
        </linearGradient>

        <!-- Card paper grad -->
        <linearGradient id="cardPaper" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f7fbfd"/>
        </linearGradient>

        <!-- Soft glow behind storefront -->
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#7c6cf2" stop-opacity="0.16"/>
          <stop offset="100%" stop-color="#7c6cf2" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- =====================================================
           SUN + SKY ELEMENTS (transparent background)
           ===================================================== -->

      <!-- Soft glow disc -->
      <circle cx="280" cy="300" r="230" fill="url(#centerGlow)"/>

      <!-- Sun / glow -->
      <circle cx="450" cy="120" r="60" fill="#ffb74a" opacity="0.30"/>
      <circle cx="450" cy="120" r="36" fill="#ffb74a" opacity="0.85"/>

      <!-- Drifting clouds -->
      <g class="anim-cloud" opacity="0.85">
        <g transform="translate(80 120)" fill="#ffffff">
          <circle cx="0"  cy="0" r="14"/>
          <circle cx="14" cy="-4" r="16"/>
          <circle cx="28" cy="2" r="12"/>
          <ellipse cx="14" cy="6" rx="26" ry="8"/>
        </g>
      </g>
      <g class="anim-cloud" style="animation-delay:-7s; animation-duration:18s;" opacity="0.8">
        <g transform="translate(310 80)" fill="#ffffff">
          <circle cx="0"  cy="0" r="10"/>
          <circle cx="12" cy="-3" r="13"/>
          <circle cx="24" cy="0" r="9"/>
          <ellipse cx="12" cy="5" rx="20" ry="6"/>
        </g>
      </g>

      <!-- Bird in flight (morphing path) -->
      <g transform="translate(200 150)" stroke="#1c3a4f" stroke-width="1.8" stroke-linecap="round" fill="none">
        <path>
          <animate attributeName="d"
            values="M -6 0 Q -3 -4 0 0 Q 3 -4 6 0;
                    M -6 0 Q -3 4 0 0 Q 3 4 6 0;
                    M -6 0 Q -3 -4 0 0 Q 3 -4 6 0"
            dur="0.9s" repeatCount="indefinite"/>
        </path>
      </g>
      <g transform="translate(360 175)" stroke="#1c3a4f" stroke-width="1.6" stroke-linecap="round" fill="none">
        <path>
          <animate attributeName="d"
            values="M -5 0 Q -2.5 -3 0 0 Q 2.5 -3 5 0;
                    M -5 0 Q -2.5 3 0 0 Q 2.5 3 5 0;
                    M -5 0 Q -2.5 -3 0 0 Q 2.5 -3 5 0"
            dur="0.9s" begin="-0.3s" repeatCount="indefinite"/>
        </path>
      </g>

      <!-- =====================================================
           BACK BUILDINGS — neighborhood silhouette
           ===================================================== -->
      <g opacity="0.85">
        <!-- Tall narrow shop left -->
        <rect x="40"  y="220" width="70"  height="180" rx="3" fill="#cfdde5"/>
        <rect x="48"  y="232" width="14"  height="14"  fill="#eef7fc"/>
        <rect x="68"  y="232" width="14"  height="14"  fill="#eef7fc"/>
        <rect x="88"  y="232" width="14"  height="14"  fill="#eef7fc"/>
        <rect x="48"  y="252" width="14"  height="14"  fill="#eef7fc" opacity="0.7"/>
        <rect x="68"  y="252" width="14"  height="14"  fill="#eef7fc" opacity="0.7"/>
        <rect x="88"  y="252" width="14"  height="14"  fill="#eef7fc"/>
        <path d="M 40 220 L 75 200 L 110 220 Z" fill="#a4b9c5"/>

        <!-- Wide low shop -->
        <rect x="120" y="250" width="120" height="150" rx="3" fill="#c5d4dd"/>
        <rect x="130" y="262" width="100" height="22" rx="2" fill="#eef7fc" opacity="0.8"/>
        <path d="M 120 250 H 240 L 230 234 H 130 Z" fill="#9eb3bf"/>

        <!-- Right tall building -->
        <rect x="430" y="200" width="90" height="200" rx="3" fill="#cfd9e3"/>
        <rect x="440" y="216" width="14" height="14" fill="#eef7fc"/>
        <rect x="460" y="216" width="14" height="14" fill="#eef7fc" opacity="0.7"/>
        <rect x="480" y="216" width="14" height="14" fill="#eef7fc"/>
        <rect x="500" y="216" width="14" height="14" fill="#eef7fc" opacity="0.6"/>
        <rect x="440" y="236" width="14" height="14" fill="#eef7fc" opacity="0.5"/>
        <rect x="460" y="236" width="14" height="14" fill="#eef7fc"/>
        <rect x="480" y="236" width="14" height="14" fill="#eef7fc" opacity="0.7"/>
        <rect x="500" y="236" width="14" height="14" fill="#eef7fc"/>
        <rect x="440" y="256" width="14" height="14" fill="#eef7fc"/>
        <rect x="460" y="256" width="14" height="14" fill="#eef7fc" opacity="0.6"/>
        <rect x="480" y="256" width="14" height="14" fill="#eef7fc" opacity="0.4"/>
        <rect x="500" y="256" width="14" height="14" fill="#eef7fc" opacity="0.7"/>
      </g>

      <!-- Tree (left) -->
      <g class="anim-sway-a">
        <g transform="translate(70 410)">
          <rect x="-3" y="0" width="6" height="22" fill="#1c3a4f"/>
          <circle cx="0"  cy="-8" r="20" fill="#4fd1a8"/>
          <circle cx="-12" cy="-2" r="14" fill="#3fb98d"/>
          <circle cx="12"  cy="-2" r="14" fill="#7ee0bf"/>
        </g>
      </g>
      <!-- Tree (right) -->
      <g class="anim-sway-b">
        <g transform="translate(490 414)">
          <rect x="-3" y="0" width="6" height="22" fill="#1c3a4f"/>
          <circle cx="0"  cy="-6" r="18" fill="#7ee0bf"/>
          <circle cx="-10" cy="0" r="12" fill="#3fb98d"/>
          <circle cx="10"  cy="0" r="12" fill="#4fd1a8"/>
        </g>
      </g>

      <!-- =====================================================
           GROUND / SIDEWALK — soft fade, no hard edges
           ===================================================== -->
      <path d="M 40 432 Q 280 425 520 432 L 520 540 Q 280 548 40 540 Z" fill="url(#groundGrad)" opacity="0.85"/>
      <!-- Paving lines -->
      <g stroke="#a4b9c5" stroke-width="1" opacity="0.55">
        <path d="M 80 460 H 500"/>
        <path d="M 130 490 H 480"/>
        <path d="M 110 520 H 460"/>
      </g>

      <!-- Cobble dots -->
      <g fill="#a4b9c5" opacity="0.6">
        <circle cx="80"  cy="475" r="1.4"/>
        <circle cx="160" cy="500" r="1.4"/>
        <circle cx="240" cy="485" r="1.4"/>
        <circle cx="320" cy="510" r="1.4"/>
        <circle cx="400" cy="490" r="1.4"/>
        <circle cx="480" cy="510" r="1.4"/>
      </g>

      <!-- =====================================================
           WALKING PATH (from corner to storefront door) — animated dashed trail
           ===================================================== -->
      <path class="anim-trace"
            d="M 50 530 C 130 510, 200 480, 270 460"
            fill="none" stroke="#7c6cf2" stroke-width="2.4" stroke-linecap="round" opacity="0.55"/>

      <!-- =====================================================
           CENTER STAGE — STOREFRONT (the cafe / shop)
           Anchored around (280, 360)
           ===================================================== -->
      <g>
        <!-- Floor shadow under shop -->
        <ellipse cx="280" cy="432" rx="160" ry="8" fill="#0e2230" opacity="0.10"/>

        <!-- Wall + facade -->
        <rect x="180" y="252" width="200" height="180" rx="6" fill="url(#storeWall)" stroke="#cfdde5" stroke-width="1.5"/>

        <!-- Roof trim -->
        <rect x="172" y="248" width="216" height="10" rx="2" fill="#0c4a63"/>
        <rect x="172" y="244" width="216" height="6"  rx="1.5" fill="#135e7c"/>

        <!-- Awning (scalloped) -->
        <g transform="translate(180 258)">
          <rect x="0" y="0" width="200" height="30" fill="url(#awning)"/>
          <!-- Stripes -->
          <rect x="10"  y="0" width="14" height="30" fill="url(#awningStripe)" opacity="0.9"/>
          <rect x="38"  y="0" width="14" height="30" fill="url(#awningStripe)" opacity="0.9"/>
          <rect x="66"  y="0" width="14" height="30" fill="url(#awningStripe)" opacity="0.9"/>
          <rect x="94"  y="0" width="14" height="30" fill="url(#awningStripe)" opacity="0.9"/>
          <rect x="122" y="0" width="14" height="30" fill="url(#awningStripe)" opacity="0.9"/>
          <rect x="150" y="0" width="14" height="30" fill="url(#awningStripe)" opacity="0.9"/>
          <rect x="178" y="0" width="14" height="30" fill="url(#awningStripe)" opacity="0.9"/>
          <!-- Scalloped bottom -->
          <path d="M 0 30
                   q 7 10 14 0  q 7 10 14 0  q 7 10 14 0  q 7 10 14 0
                   q 7 10 14 0  q 7 10 14 0  q 7 10 14 0  q 7 10 14 0
                   q 7 10 14 0  q 7 10 14 0  q 7 10 14 0  q 7 10 14 0
                   q 7 10 14 0  q 7 10 14 0  L 200 30 Z"
                fill="url(#awning)"/>
        </g>

        <!-- Sign board (with name as decorative bars — no text) -->
        <g class="anim-float-y">
          <rect x="220" y="298" width="120" height="26" rx="6" fill="#ffffff" stroke="#cfdde5" stroke-width="1.6"/>
          <!-- Coffee bean glyph -->
          <g transform="translate(232 311)" fill="#21759b">
            <ellipse cx="0" cy="0" rx="6" ry="4"/>
            <path d="M -4 -2 Q 0 0 4 2" stroke="#ffffff" stroke-width="1.2" fill="none"/>
          </g>
          <!-- Faux name bars -->
          <rect x="246" y="305" width="80" height="6" rx="2" fill="#0e2230"/>
          <rect x="246" y="315" width="56" height="4" rx="2" fill="#7c6cf2"/>
        </g>

        <!-- Left window -->
        <g>
          <rect x="200" y="334" width="64" height="80" rx="4" fill="url(#window)" stroke="#0c4a63" stroke-width="1.5"/>
          <!-- Cross frame -->
          <path d="M 232 334 V 414" stroke="#0c4a63" stroke-width="1.5"/>
          <path d="M 200 374 H 264" stroke="#0c4a63" stroke-width="1.5"/>
          <!-- Window highlight -->
          <path d="M 206 340 L 226 340 L 206 360 Z" fill="#ffffff" opacity="0.55"/>
          <!-- Plant on sill -->
          <rect x="208" y="408" width="22" height="10" rx="2" fill="#0c4a63"/>
          <g class="anim-sway-a" style="animation-duration:5s;">
            <g transform="translate(219 408)">
              <path d="M 0 0 Q -6 -8 -10 -14" stroke="#3fb98d" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M 0 0 Q  6 -8  10 -14" stroke="#3fb98d" stroke-width="2" fill="none" stroke-linecap="round"/>
              <circle cx="-10" cy="-14" r="3" fill="#4fd1a8"/>
              <circle cx="10"  cy="-14" r="3" fill="#4fd1a8"/>
              <circle cx="0"   cy="-10" r="3" fill="#7ee0bf"/>
            </g>
          </g>
          <!-- "OPEN" sign hanging in window -->
          <g class="anim-bell">
            <line x1="232" y1="334" x2="232" y2="346" stroke="#0c4a63" stroke-width="0.8"/>
            <rect x="216" y="346" width="32" height="14" rx="3" fill="#ff6b5b" stroke="#9b3526" stroke-width="1"/>
            <rect x="220" y="350" width="24" height="3" rx="1.5" fill="#ffffff"/>
            <rect x="222" y="355" width="20" height="2" rx="1" fill="#ffffff" opacity="0.8"/>
          </g>
        </g>

        <!-- Door (center) -->
        <g>
          <rect x="270" y="338" width="40" height="94" rx="5" fill="url(#door)" stroke="#0e2230" stroke-width="1.6"/>
          <!-- Door window -->
          <rect x="278" y="346" width="24" height="28" rx="3" fill="url(#window)" stroke="#0e2230"/>
          <path d="M 290 346 V 374" stroke="#0e2230"/>
          <!-- Knob -->
          <circle cx="302" cy="392" r="2" fill="#ffb74a"/>
          <!-- Doormat -->
          <rect x="266" y="430" width="48" height="6" rx="1" fill="#7c6cf2"/>
          <!-- Steps -->
          <rect x="262" y="434" width="56" height="3" fill="#0c4a63"/>
        </g>

        <!-- Right window -->
        <g>
          <rect x="316" y="334" width="56" height="80" rx="4" fill="url(#window)" stroke="#0c4a63" stroke-width="1.5"/>
          <path d="M 344 334 V 414" stroke="#0c4a63" stroke-width="1.5"/>
          <path d="M 316 374 H 372" stroke="#0c4a63" stroke-width="1.5"/>
          <path d="M 322 340 L 340 340 L 322 358 Z" fill="#ffffff" opacity="0.55"/>
          <!-- Cake / display silhouettes -->
          <rect x="322" y="394" width="14" height="10" rx="2" fill="#ff6b5b"/>
          <rect x="340" y="392" width="12" height="12" rx="2" fill="#7c6cf2"/>
          <rect x="356" y="396" width="12" height="8" rx="2" fill="#ffb74a"/>
          <!-- Hours pill -->
          <g>
            <rect x="320" y="382" width="48" height="8" rx="4" fill="#ffffff" stroke="#cfdde5" stroke-width="0.8"/>
            <circle cx="326" cy="386" r="1.4" fill="#3fb98d"/>
            <rect x="332" y="384" width="32" height="4" rx="1.5" fill="#0e2230"/>
          </g>
        </g>

        <!-- Chalkboard sandwich sign on sidewalk -->
        <g class="anim-sway-a" style="animation-duration:7s;">
          <g transform="translate(146 432)">
            <path d="M 0 0 L -10 -32 L 22 -32 L 12 0 Z" fill="#0e2230" stroke="#000000" stroke-width="1.4" stroke-linejoin="round"/>
            <rect x="-6" y="-28" width="22" height="22" rx="2" fill="#0c4a63"/>
            <!-- Faux menu lines -->
            <rect x="-4" y="-25" width="16" height="2" rx="1" fill="#ffb74a"/>
            <rect x="-4" y="-21" width="12" height="1.6" rx="0.8" fill="#ffffff" opacity="0.7"/>
            <rect x="-4" y="-17" width="14" height="1.6" rx="0.8" fill="#ffffff" opacity="0.7"/>
            <rect x="-4" y="-13" width="10" height="1.6" rx="0.8" fill="#ffffff" opacity="0.7"/>
            <!-- Heart -->
            <path d="M 14 -22 q -3 -3 -6 0 q 3 4 6 7 q 3 -3 6 -7 q -3 -3 -6 0 Z" fill="#ff6b5b"/>
          </g>
        </g>

        <!-- Bicycle leaning against wall -->
        <g transform="translate(395 410)" fill="none" stroke="#0e2230" stroke-width="1.8" stroke-linecap="round">
          <circle cx="0"  cy="14" r="10"/>
          <circle cx="32" cy="14" r="10"/>
          <path d="M 0 14 L 14 -2 L 28 -2 L 32 14"/>
          <path d="M 14 -2 L 22 14"/>
          <path d="M 28 -2 L 30 -8 L 38 -8" stroke-width="1.4"/>

          <g stroke-width="0.8" opacity="0.7">
            <path d="M 0 4 L 0 24"/>
            <path d="M -10 14 L 10 14"/>
            <path d="M 32 4 L 32 24"/>
            <path d="M 22 14 L 42 14"/>
          </g>
        </g>
      </g>

      <!-- =====================================================
           CHIMNEY + STEAM (from cafe, suggesting "open & warm")
           ===================================================== -->
      <g transform="translate(360 248)">
        <rect x="-6" y="-18" width="14" height="20" rx="2" fill="#0c4a63"/>
        <rect x="-8" y="-22" width="18" height="6" rx="2" fill="#1c3a4f"/>
        <!-- Steam puffs -->
        <g fill="#ffffff" opacity="0.85">
          <circle class="anim-steam" cx="0" cy="-22" r="5"/>
          <circle class="anim-steam" style="animation-delay:-1.1s;" cx="-4" cy="-26" r="4"/>
          <circle class="anim-steam" style="animation-delay:-2.2s;" cx="4" cy="-24" r="3.5"/>
        </g>
      </g>

      <!-- =====================================================
           MAP PIN — drops onto the storefront, big & central focal
           ===================================================== -->
      <g transform="translate(280 232)">
        <!-- Shadow -->
        <ellipse class="anim-pin-shadow" cx="0" cy="218" rx="20" ry="5" fill="#0e2230"/>
        <g class="anim-pin">
          <!-- Pin body -->
          <path d="M 0 0
                   C -22 0, -34 18, -34 38
                   C -34 62, -8 90, 0 100
                   C 8 90, 34 62, 34 38
                   C 34 18, 22 0, 0 0 Z"
                fill="url(#pinGrad)" stroke="#d04a3a" stroke-width="1.6"/>
          <!-- Highlight -->
          <path d="M -16 14 Q -22 26, -16 42" fill="none" stroke="#ffffff" stroke-width="2.2" opacity="0.55" stroke-linecap="round"/>
          <!-- Inner circle -->
          <circle cx="0" cy="38" r="13" fill="#ffffff"/>
          <!-- House glyph inside pin -->
          <g transform="translate(0 38)" fill="none" stroke="#ff6b5b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M -7 4 V -2 L 0 -7 L 7 -2 V 4 Z"/>
            <path d="M -3 4 V 0 H 3 V 4"/>
          </g>
        </g>
        <!-- Pulse rings out from pin tip -->
        <g transform="translate(0 100)">
          <circle class="anim-ring" r="20" fill="none" stroke="#ff6b5b" stroke-width="2"/>
          <circle class="anim-ring" style="animation-delay:1.4s;" r="20" fill="none" stroke="#7c6cf2" stroke-width="2"/>
        </g>
      </g>

      <!-- =====================================================
           FLOATING UI CARDS — what makes a "real" local site
           Each is a small paper card hand-tilted on the scene
           ===================================================== -->

      <!-- HOURS card (top-left, tilted) -->
      <g transform="translate(116 168) rotate(-7)">
        <g class="anim-float-y">
          <rect x="-58" y="-36" width="116" height="72" rx="10" fill="url(#cardPaper)" stroke="#cfdde5" stroke-width="1.6"/>
          <!-- tape strip -->
          <rect x="-12" y="-44" width="24" height="10" fill="#ffb74a" opacity="0.7" transform="rotate(-4)"/>
          <!-- clock icon -->
          <g transform="translate(-38 0)" fill="none" stroke="#3fb98d" stroke-width="2" stroke-linecap="round">
            <circle r="11" fill="#e8f8f0"/>
            <path d="M 0 -7 V 0 L 5 4"/>
          </g>
          <!-- bars -->
          <rect x="-22" y="-16" width="64" height="6" rx="2" fill="#0e2230"/>
          <rect x="-22" y="-6" width="48" height="4" rx="2" fill="#7c6cf2"/>
          <!-- mini schedule rows -->
          <rect x="-22" y="6"  width="32" height="3" rx="1.5" fill="#cfdde5"/>
          <rect x="14"  y="6"  width="22" height="3" rx="1.5" fill="#3fb98d"/>
          <rect x="-22" y="14" width="32" height="3" rx="1.5" fill="#cfdde5"/>
          <rect x="14"  y="14" width="22" height="3" rx="1.5" fill="#3fb98d"/>
          <rect x="-22" y="22" width="32" height="3" rx="1.5" fill="#cfdde5"/>
          <rect x="14"  y="22" width="14" height="3" rx="1.5" fill="#ff6b5b"/>
        </g>
      </g>

      <!-- REVIEW card (top-right, tilted other way) -->
      <g transform="translate(456 142) rotate(8)">
        <g class="anim-float-y" style="animation-delay:-2s">
          <rect x="-58" y="-36" width="116" height="72" rx="10" fill="url(#cardPaper)" stroke="#cfdde5" stroke-width="1.6"/>
          <rect x="-14" y="-44" width="28" height="10" fill="#7c6cf2" opacity="0.6" transform="rotate(6)"/>
          <!-- avatar -->
          <circle cx="-38" cy="-14" r="10" fill="#7c6cf2"/>
          <path d="M -44 -2 a 6 4 0 0 1 12 0" fill="#7c6cf2"/>
          <!-- name + handle bars -->
          <rect x="-22" y="-20" width="56" height="6" rx="2" fill="#0e2230"/>
          <rect x="-22" y="-10" width="36" height="3" rx="1.5" fill="#7c6cf2"/>
          <!-- 5 stars -->
          <g fill="#ffb74a">
            <g class="anim-star">
              <path d="M -36 14 l 1.6 3.4 l 3.6 0.4 l -2.6 2.4 l 0.8 3.6 l -3.4 -1.8 l -3.4 1.8 l 0.8 -3.6 l -2.6 -2.4 l 3.6 -0.4 Z"/>
            </g>
            <g class="anim-star" style="animation-delay:-.3s;">
              <path d="M -20 14 l 1.6 3.4 l 3.6 0.4 l -2.6 2.4 l 0.8 3.6 l -3.4 -1.8 l -3.4 1.8 l 0.8 -3.6 l -2.6 -2.4 l 3.6 -0.4 Z"/>
            </g>
            <g class="anim-star" style="animation-delay:-.6s;">
              <path d="M -4 14 l 1.6 3.4 l 3.6 0.4 l -2.6 2.4 l 0.8 3.6 l -3.4 -1.8 l -3.4 1.8 l 0.8 -3.6 l -2.6 -2.4 l 3.6 -0.4 Z"/>
            </g>
            <g class="anim-star" style="animation-delay:-.9s;">
              <path d="M 12 14 l 1.6 3.4 l 3.6 0.4 l -2.6 2.4 l 0.8 3.6 l -3.4 -1.8 l -3.4 1.8 l 0.8 -3.6 l -2.6 -2.4 l 3.6 -0.4 Z"/>
            </g>
            <g class="anim-star" style="animation-delay:-1.2s;">
              <path d="M 28 14 l 1.6 3.4 l 3.6 0.4 l -2.6 2.4 l 0.8 3.6 l -3.4 -1.8 l -3.4 1.8 l 0.8 -3.6 l -2.6 -2.4 l 3.6 -0.4 Z"/>
            </g>
          </g>
          <!-- quote bar -->
          <rect x="-22" y="2" width="68" height="3" rx="1.5" fill="#7c6cf2"/>
        </g>
      </g>

      <!-- DIRECTIONS / MAP card (bottom-left) — with animated traveler dot -->
      <g transform="translate(120 460) rotate(-4)">
        <g class="anim-float-y" style="animation-delay:-1s">
          <rect x="-60" y="-36" width="120" height="72" rx="10" fill="url(#cardPaper)" stroke="#cfdde5" stroke-width="1.6"/>
          <!-- mini map -->
          <rect x="-52" y="-28" width="104" height="56" rx="6" fill="#eef7fc"/>
          <!-- streets -->
          <g stroke="#cfdde5" stroke-width="2" stroke-linecap="round">
            <path d="M -52 -10 H 52"/>
            <path d="M -52 8 H 52"/>
            <path d="M -22 -28 V 28"/>
            <path d="M 18 -28 V 28"/>
          </g>
          <!-- river -->
          <path d="M -52 -22 Q -20 -16 0 -22 Q 30 -28 52 -16" stroke="#7c6cf2" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.45"/>
          <!-- route -->
          <path d="M -44 22 L -44 8 L -22 8 L -22 -10 L 18 -10 L 18 -2"
                class="anim-dash" stroke="#ff6b5b" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- destination pin on map -->
          <g transform="translate(18 -2)" fill="#ff6b5b">
            <path d="M 0 0 C -4 0 -7 3 -7 7 C -7 12 0 18 0 18 C 0 18 7 12 7 7 C 7 3 4 0 0 0 Z"/>
            <circle cx="0" cy="7" r="2.4" fill="#ffffff"/>
          </g>
          <!-- start dot -->
          <circle cx="-44" cy="22" r="3.4" fill="#3fb98d" stroke="#ffffff" stroke-width="1.4"/>
        </g>
      </g>

      <!-- PHONE / CALL bubble (bottom-right) -->
      <g transform="translate(454 482) rotate(6)">
        <g class="anim-float-y" style="animation-delay:-3s">
          <rect x="-50" y="-30" width="100" height="60" rx="10" fill="url(#cardPaper)" stroke="#cfdde5" stroke-width="1.6"/>
          <!-- phone receiver icon -->
          <g transform="translate(-32 0)" fill="#3fb98d" stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round">
            <path d="M -8 -8 q 0 -4 4 -4 h 4 q 4 0 4 4 l 2 6 -4 4 q 4 8 12 12 l 4 -4 6 2 q 4 0 4 4 v 4 q 0 4 -4 4 c -16 0 -32 -16 -32 -32 Z" transform="scale(0.5)"/>
          </g>
          <!-- call number bars -->
          <rect x="-16" y="-12" width="56" height="6" rx="2" fill="#0e2230"/>
          <rect x="-16" y="-2" width="40" height="4" rx="2" fill="#7c6cf2"/>
          <!-- click button -->
          <g class="anim-float-y" style="animation-delay:-1s; animation-duration:3.6s;">
            <rect x="-16" y="8" width="56" height="14" rx="7" fill="#21759b"/>
            <path d="M -8 15 l 4 -3 v 6 z" fill="#ffffff"/>
            <rect x="0" y="13" width="32" height="4" rx="2" fill="#ffffff"/>
          </g>
          <!-- tape -->
          <rect x="-12" y="-38" width="24" height="10" fill="#ff6b5b" opacity="0.65" transform="rotate(-5)"/>
        </g>
      </g>

      <!-- =====================================================
           WAVING SHOPKEEPER — peeks from window
           ===================================================== -->
      <g transform="translate(232 384)">
        <!-- Head -->
        <circle cx="0" cy="0" r="8" fill="#f4c79d"/>
        <!-- Hair -->
        <path d="M -8 -3 Q -6 -10 0 -10 Q 6 -10 8 -3 L 6 -2 Q 4 -6 0 -6 Q -4 -6 -6 -2 Z" fill="#0c4a63"/>
        <!-- Shirt -->
        <path d="M -10 8 Q -8 14 0 14 Q 8 14 10 8 L 10 18 H -10 Z" fill="#21759b"/>
        <!-- Apron strap -->
        <path d="M -3 8 V 18 M 3 8 V 18" stroke="#ffffff" stroke-width="1.4"/>
        <!-- Smile + eyes -->
        <circle cx="-2.6" cy="-1" r="0.9" fill="#0e2230"/>
        <circle cx="2.6"  cy="-1" r="0.9" fill="#0e2230"/>
        <path d="M -2 3 Q 0 5 2 3" stroke="#0e2230" stroke-width="1" fill="none" stroke-linecap="round"/>
        <!-- Waving arm -->
        <g class="anim-hand">
          <g transform="translate(8 6)">
            <path d="M 0 0 L 12 -10" stroke="#f4c79d" stroke-width="4" stroke-linecap="round"/>
            <circle cx="13" cy="-11" r="3.2" fill="#f4c79d"/>
          </g>
        </g>
      </g>

      <!-- =====================================================
           DECORATIVE STRING LIGHTS — strung between trees / building
           ===================================================== -->
      <g>
        <path d="M 70 380 Q 200 340 280 248" fill="none" stroke="#1c3a4f" stroke-width="1" opacity="0.5"/>
        <path d="M 280 248 Q 380 340 490 380" fill="none" stroke="#1c3a4f" stroke-width="1" opacity="0.5"/>
        <!-- bulbs -->
        <g>
          <circle cx="120" cy="356" r="3" fill="#ffb74a"/>
          <circle cx="170" cy="332" r="3" fill="#ff6b5b"/>
          <circle cx="220" cy="304" r="3" fill="#7c6cf2"/>
          <circle cx="340" cy="304" r="3" fill="#3fb98d"/>
          <circle cx="390" cy="332" r="3" fill="#ffb74a"/>
          <circle cx="440" cy="356" r="3" fill="#ff6b5b"/>
        </g>
        <!-- twinkle overlays -->
        <g class="anim-star" style="animation-duration:2.4s;">
          <circle cx="120" cy="356" r="5" fill="#ffb74a" opacity="0.45"/>
        </g>
        <g class="anim-star" style="animation-duration:2.6s; animation-delay:-.7s;">
          <circle cx="220" cy="304" r="5" fill="#7c6cf2" opacity="0.45"/>
        </g>
        <g class="anim-star" style="animation-duration:2.4s; animation-delay:-1.3s;">
          <circle cx="340" cy="304" r="5" fill="#3fb98d" opacity="0.45"/>
        </g>
        <g class="anim-star" style="animation-duration:2.6s; animation-delay:-1.8s;">
          <circle cx="440" cy="356" r="5" fill="#ff6b5b" opacity="0.45"/>
        </g>
      </g>

    </svg>
  </div>
</section>
