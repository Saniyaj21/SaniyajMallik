<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WordPress Migrations — Hero Vector</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --wp-blue: #21759b;
    --wp-blue-deep: #135e7c;
    --wp-blue-darker: #0c4a63;
    --wp-blue-light: #4a9bc4;
    --wp-blue-soft: #d6ecf6;
    --ink: #0e2230;
    --ink-soft: #1c3a4f;
    --accent-coral: #ff6b5b;
    --accent-amber: #ffb74a;
    --accent-mint: #4fd1a8;
    --accent-violet: #7c6cf2;
    --accent-pink: #ef6ea8;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% 20%, #eef7fc 0%, transparent 60%),
      radial-gradient(900px 500px at 10% 90%, #f0e9ff 0%, transparent 60%),
      #fbfdff;
    color: var(--ink);
    min-height: 100vh;
  }

  .hero {
    max-width: 1340px;
    margin: 0 auto;
    padding: 56px 48px 80px;
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 48px;
    align-items: center;
    min-height: 100vh;
  }

  .hero-copy .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--wp-blue);
    background: var(--wp-blue-soft);
    padding: 6px 12px; border-radius: 999px;
  }
  .hero-copy .eyebrow::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-mint);
    box-shadow: 0 0 0 4px rgba(79, 209, 168, 0.2);
  }
  .hero-copy h1 {
    font-size: clamp(40px, 5vw, 68px);
    line-height: 1.02;
    letter-spacing: -0.028em;
    font-weight: 800;
    margin: 18px 0 18px;
    text-wrap: pretty;
  }
  .hero-copy h1 .grad {
    background: linear-gradient(120deg, var(--wp-blue) 0%, var(--accent-violet) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero-copy p {
    font-size: 18px; line-height: 1.55;
    color: var(--ink-soft);
    max-width: 52ch; margin: 0 0 28px;
  }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    font: inherit; font-weight: 600; font-size: 15px;
    padding: 14px 22px; border-radius: 12px;
    border: 1px solid transparent; cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary {
    background: var(--wp-blue); color: white;
    box-shadow: 0 8px 20px -8px rgba(33,117,155,0.7);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 24px -8px rgba(33,117,155,0.7); }
  .btn-ghost { background: white; color: var(--ink); border-color: #d9e3ea; }
  .btn-ghost:hover { border-color: var(--wp-blue); color: var(--wp-blue); }

  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-height: 640px;
    display: flex; align-items: center; justify-content: center;
  }
  .stage svg {
    width: 100%; height: 100%; display: block; overflow: visible;
  }

  /* Animations — match Build/Launch/Scale vocabulary */
  @keyframes float-a {
    0%   { transform: translate3d(0, 0, 0); }
    50%  { transform: translate3d(0, -10px, 0); }
    100% { transform: translate3d(0, 0, 0); }
  }
  @keyframes float-b {
    0%   { transform: translate3d(0, 0, 0); }
    50%  { transform: translate3d(0, -14px, 0); }
    100% { transform: translate3d(0, 0, 0); }
  }
  @keyframes float-c {
    0%   { transform: translate3d(0, 0, 0); }
    50%  { transform: translate3d(0, -8px, 0); }
    100% { transform: translate3d(0, 0, 0); }
  }
  @keyframes ring-pulse {
    0%   { transform: scale(0.85); opacity: 0.55; }
    80%  { opacity: 0.05; }
    100% { transform: scale(1.55); opacity: 0; }
  }
  @keyframes spin-slow { to { transform: rotate(360deg); } }
  @keyframes orbit { to { transform: rotate(360deg); } }
  @keyframes orbit-rev { to { transform: rotate(-360deg); } }
  @keyframes line-draw { to { stroke-dashoffset: 0; } }
  @keyframes dash-flow-fwd { to { stroke-dashoffset: -48; } }
  @keyframes dash-flow-rev { to { stroke-dashoffset: 48; } }
  @keyframes pop-dot {
    0%, 100% { opacity: 0.35; transform: scale(0.9); }
    50%      { opacity: 1;    transform: scale(1.05); }
  }
  @keyframes shimmer-x {
    0%   { transform: translateX(-80px); }
    100% { transform: translateX(260px); }
  }
  @keyframes packet-fly {
    0%   { offset-distance: 0%;   opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { offset-distance: 100%; opacity: 0; }
  }
  @keyframes progress-fill {
    0%   { width: 18%; }
    50%  { width: 78%; }
    100% { width: 96%; }
  }
  @keyframes check-pop {
    0%, 70% { transform: scale(0.6); opacity: 0; }
    80%     { transform: scale(1.18); opacity: 1; }
    100%    { transform: scale(1);    opacity: 1; }
  }

  .anim-float-a, .anim-float-b, .anim-float-c,
  .anim-ring, .anim-spin, .anim-orbit, .anim-orbit-rev,
  .anim-line, .anim-dash-fwd, .anim-dash-rev, .anim-dot {
    will-change: transform, opacity;
    backface-visibility: hidden;
    transform: translateZ(0);
  }

  .anim-float-a { animation: float-a 7s   cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-b { animation: float-b 8s   cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-c { animation: float-c 6.5s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-ring    { animation: ring-pulse 3.2s cubic-bezier(.25,.6,.35,1) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-spin    { animation: spin-slow 24s linear infinite; transform-origin: center; transform-box: fill-box; }
  .anim-orbit     { animation: orbit 32s linear infinite; transform-origin: 280px 280px; }
  .anim-orbit-rev { animation: orbit-rev 38s linear infinite; transform-origin: 280px 280px; }
  .anim-line     { stroke-dasharray: 280; stroke-dashoffset: 280; animation: line-draw 4s cubic-bezier(.34,.01,.21,1) infinite alternate; }
  .anim-dash-fwd { stroke-dasharray: 6 6; animation: dash-flow-fwd 2.2s linear infinite; }
  .anim-dash-rev { stroke-dasharray: 6 6; animation: dash-flow-rev 2.2s linear infinite; }
  .anim-dot      { animation: pop-dot 3s cubic-bezier(.45,.05,.55,.95) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-check    { animation: check-pop 4s cubic-bezier(.34,.01,.21,1) infinite; transform-origin: center; transform-box: fill-box; }

  /* Packets follow the migration arc using offset-path */
  .packet {
    offset-path: path('M 110 320 C 180 180, 380 180, 450 320');
    offset-rotate: 0deg;
    animation: packet-fly 3.2s cubic-bezier(.45,.05,.55,.95) infinite;
    will-change: offset-distance, opacity;
  }
  .packet-2 { animation-delay: -1.0s; }
  .packet-3 { animation-delay: -2.0s; }
  .packet-4 { animation-delay: -0.5s; }
  .packet-5 { animation-delay: -1.6s; }

  /* Progress bar fill (uses width animation on a clipped rect via SVG-friendly transform) */
  .progress-fill-rect {
    transform-origin: left center;
    transform-box: fill-box;
    animation: progress-fill 4.5s cubic-bezier(.34,.01,.21,1) infinite alternate;
    will-change: transform;
  }

  /* Shimmer */
  .anim-shimmer {
    animation: shimmer-x 4s ease-in-out infinite;
  }

  .stage svg, .stage svg text {
    text-rendering: geometricPrecision;
    shape-rendering: geometricPrecision;
  }

  @media (prefers-reduced-motion: reduce) {
    .anim-float-a, .anim-float-b, .anim-float-c, .anim-ring, .anim-spin,
    .anim-orbit, .anim-orbit-rev, .anim-line, .anim-dash-fwd, .anim-dash-rev,
    .anim-dot, .anim-check, .packet, .anim-shimmer { animation: none; }
    .anim-line { stroke-dashoffset: 0; }
  }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; padding: 32px 20px 60px; }
    .hero-copy { order: 2; }
    .stage { order: 1; max-height: 520px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-copy">
    <span class="eyebrow">WordPress · Migrations</span>
    <h1>WordPress<br><span class="grad">Migrations</span></h1>
    <p>Move platforms without losing data, SEO, or sleep. We migrate every post, redirect, user, and pixel — with zero‑downtime cutovers and integrity checks at every step.</p>
    <div class="hero-cta">
      <button class="btn btn-primary">Plan a migration</button>
      <button class="btn btn-ghost">See the checklist</button>
    </div>
  </div>

  <div class="stage" aria-label="Illustration of data migrating from a legacy platform to WordPress through a secure verified pipeline">
    <svg viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg" role="img">
      <defs>
        <!-- Source / destination card grads -->
        <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f3f8fb"/>
        </linearGradient>
        <linearGradient id="srcHeader" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#6b8294"/>
          <stop offset="100%" stop-color="#8aa2b3"/>
        </linearGradient>
        <linearGradient id="dstHeader" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#21759b"/>
          <stop offset="100%" stop-color="#7c6cf2"/>
        </linearGradient>

        <!-- Pipe / arc -->
        <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#6b8294"/>
          <stop offset="50%" stop-color="#7c6cf2"/>
          <stop offset="100%" stop-color="#21759b"/>
        </linearGradient>
        <linearGradient id="pipeFill" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#7c6cf2" stop-opacity="0"/>
          <stop offset="50%" stop-color="#7c6cf2" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#21759b" stop-opacity="0"/>
        </linearGradient>

        <!-- Hex badges -->
        <linearGradient id="badgeSeo"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7ee0bf"/><stop offset="100%" stop-color="#3fb98d"/></linearGradient>
        <linearGradient id="badgeData"  x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a9bc4"/><stop offset="100%" stop-color="#21759b"/></linearGradient>
        <linearGradient id="badgeMedia" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffd06b"/><stop offset="100%" stop-color="#f5a623"/></linearGradient>
        <linearGradient id="badgeRedir" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9d8ff8"/><stop offset="100%" stop-color="#7c6cf2"/></linearGradient>
        <linearGradient id="badgeUsers" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8a7d"/><stop offset="100%" stop-color="#ff6b5b"/></linearGradient>
        <linearGradient id="badgeSsl"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f7a3c6"/><stop offset="100%" stop-color="#ef6ea8"/></linearGradient>

        <!-- Soft glow -->
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#7c6cf2" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#7c6cf2" stop-opacity="0"/>
        </radialGradient>

        <!-- Shimmer -->
        <linearGradient id="shimmerGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="white" stop-opacity="0"/>
          <stop offset="50%" stop-color="white" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>
        <clipPath id="dstClip"><rect x="320" y="300" width="180" height="160" rx="14"/></clipPath>
        <clipPath id="progressClip"><rect x="343" y="438" width="134" height="10" rx="5"/></clipPath>
      </defs>

      <!-- =====================================================
           BACKDROP — soft glow + orbit guides
           ===================================================== -->
      <circle cx="280" cy="280" r="240" fill="url(#centerGlow)"/>

      <circle cx="280" cy="280" r="200" fill="none" stroke="#cfdde5" stroke-width="1" stroke-dasharray="2 6" opacity="0.7"/>
      <circle cx="280" cy="280" r="248" fill="none" stroke="#cfdde5" stroke-width="1" stroke-dasharray="2 6" opacity="0.5"/>

      <g class="anim-orbit">
        <circle cx="480" cy="280" r="3" fill="#21759b"/>
        <circle cx="80"  cy="280" r="3" fill="#7c6cf2"/>
        <circle cx="280" cy="80"  r="2.4" fill="#3fb98d"/>
      </g>
      <g class="anim-orbit-rev">
        <circle cx="280" cy="528" r="2.4" fill="#ffb74a"/>
        <circle cx="421" cy="421" r="2"   fill="#ef6ea8"/>
        <circle cx="139" cy="139" r="2"   fill="#21759b" opacity="0.7"/>
      </g>

      <!-- Pulse rings under center shield -->
      <g transform="translate(280 250)">
        <circle class="anim-ring" r="80" fill="none" stroke="#7c6cf2" stroke-width="1.6" opacity="0.5"/>
        <circle class="anim-ring" style="animation-delay:1.3s" r="80" fill="none" stroke="#21759b" stroke-width="1.6" opacity="0.5"/>
      </g>

      <!-- =====================================================
           MIGRATION ARC (the "secure pipe")
           Path: M 110 320  C 180 180, 380 180, 450 320
           ===================================================== -->
      <!-- Pipe halo -->
      <path d="M 110 320 C 180 180, 380 180, 450 320"
            fill="none" stroke="url(#pipeFill)" stroke-width="36" stroke-linecap="round" opacity="0.55"/>
      <!-- Pipe stroke -->
      <path d="M 110 320 C 180 180, 380 180, 450 320"
            fill="none" stroke="url(#pipeGrad)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
      <!-- Flowing dashes along pipe -->
      <path class="anim-dash-fwd"
            d="M 110 320 C 180 180, 380 180, 450 320"
            fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>

      <!-- Arrow head at WP destination -->
      <g transform="translate(450 320)">
        <circle r="10" fill="#21759b"/>
        <path d="M -3 -4 L 3 0 L -3 4 Z" fill="#ffffff"/>
      </g>
      <!-- Anchor at source -->
      <g transform="translate(110 320)">
        <circle r="10" fill="#6b8294"/>
        <circle r="4"  fill="#ffffff"/>
      </g>

      <!-- =====================================================
           DATA PACKETS — small chips flying along the pipe
           ===================================================== -->
      <!-- DB packet -->
      <g class="packet">
        <g transform="translate(-12 -10)">
          <rect width="24" height="20" rx="5" fill="#ffffff" stroke="#21759b" stroke-width="1.4"/>
          <ellipse cx="12" cy="6"  rx="6" ry="2" fill="none" stroke="#21759b" stroke-width="1.2"/>
          <path    d="M 6 6 V 14 a 6 2 0 0 0 12 0 V 6" fill="none" stroke="#21759b" stroke-width="1.2"/>
        </g>
      </g>
      <!-- Page/post packet -->
      <g class="packet packet-2">
        <g transform="translate(-12 -10)">
          <rect width="24" height="20" rx="5" fill="#ffffff" stroke="#7c6cf2" stroke-width="1.4"/>
          <rect x="6" y="6"  width="12" height="1.6" fill="#7c6cf2"/>
          <rect x="6" y="10" width="12" height="1.6" fill="#7c6cf2" opacity="0.6"/>
          <rect x="6" y="14" width="8"  height="1.6" fill="#7c6cf2" opacity="0.4"/>
        </g>
      </g>
      <!-- Image packet -->
      <g class="packet packet-3">
        <g transform="translate(-12 -10)">
          <rect width="24" height="20" rx="5" fill="#ffffff" stroke="#f5a623" stroke-width="1.4"/>
          <circle cx="9" cy="9" r="2" fill="#f5a623"/>
          <path d="M 4 16 L 10 11 L 14 14 L 20 8" fill="none" stroke="#f5a623" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
      <!-- User packet -->
      <g class="packet packet-4">
        <g transform="translate(-12 -10)">
          <rect width="24" height="20" rx="5" fill="#ffffff" stroke="#ff6b5b" stroke-width="1.4"/>
          <circle cx="12" cy="9" r="2.4" fill="#ff6b5b"/>
          <path d="M 6 16 a 6 4 0 0 1 12 0" fill="none" stroke="#ff6b5b" stroke-width="1.4" stroke-linecap="round"/>
        </g>
      </g>
      <!-- Redirect packet -->
      <g class="packet packet-5">
        <g transform="translate(-12 -10)">
          <rect width="24" height="20" rx="5" fill="#ffffff" stroke="#3fb98d" stroke-width="1.4"/>
          <path d="M 6 12 H 14 L 11 9 M 14 12 L 11 15"   fill="none" stroke="#3fb98d" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M 18 8 H 12 L 15 5"                    fill="none" stroke="#3fb98d" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
        </g>
      </g>

      <!-- =====================================================
           SOURCE PLATFORM (left) — generic legacy CMS card
           Anchor of pipe at (110, 320)
           ===================================================== -->
      <g class="anim-float-a">
        <g transform="translate(60 300)">
          <!-- Drop shadow -->
          <rect x="4" y="6" width="120" height="150" rx="14" fill="#0c4a63" opacity="0.10"/>
          <!-- Card -->
          <rect x="0" y="0" width="120" height="150" rx="14" fill="url(#cardBg)" stroke="#cfdde5"/>
          <!-- Header -->
          <rect x="0" y="0" width="120" height="28" rx="14" fill="url(#srcHeader)"/>
          <rect x="0" y="14" width="120" height="14" fill="url(#srcHeader)"/>
          <!-- Window dots -->
          <circle cx="12" cy="14" r="2.6" fill="#ffffff" opacity="0.9"/>
          <circle cx="22" cy="14" r="2.6" fill="#ffffff" opacity="0.6"/>
          <circle cx="32" cy="14" r="2.6" fill="#ffffff" opacity="0.4"/>
          <!-- Label bars in header -->
          <rect x="46" y="11" width="50" height="6" rx="3" fill="#ffffff" opacity="0.8"/>

          <!-- Generic "old CMS" cog as the brand mark -->
          <g transform="translate(60 70)">
            <g class="anim-spin">
              <circle r="22" fill="#eef3f6" stroke="#cfdde5"/>
              <circle r="8"  fill="#6b8294"/>
              <g fill="#6b8294">
                <rect x="-2" y="-26" width="4" height="6" rx="1.5"/>
                <rect x="-2" y="20"  width="4" height="6" rx="1.5"/>
                <rect x="-26" y="-2" width="6" height="4" rx="1.5"/>
                <rect x="20"  y="-2" width="6" height="4" rx="1.5"/>
                <rect x="-21" y="-21" width="6" height="4" rx="1.5" transform="rotate(45)"/>
                <rect x="14"  y="-21" width="6" height="4" rx="1.5" transform="rotate(45)"/>
                <rect x="-21" y="16"  width="6" height="4" rx="1.5" transform="rotate(45)"/>
                <rect x="14"  y="16"  width="6" height="4" rx="1.5" transform="rotate(45)"/>
              </g>
            </g>
          </g>

          <!-- Content placeholder bars -->
          <rect x="14" y="108" width="92" height="6" rx="3" fill="#cfdde5"/>
          <rect x="14" y="120" width="64" height="5" rx="2.5" fill="#dde6ec"/>
          <rect x="14" y="130" width="78" height="5" rx="2.5" fill="#dde6ec"/>

          <!-- Outbound arrow corner badge -->
          <g transform="translate(102 122)">
            <circle r="10" fill="#ffffff" stroke="#cfdde5"/>
            <path d="M -3 0 H 4 M 1 -3 L 4 0 L 1 3" stroke="#6b8294" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
        </g>
      </g>

      <!-- =====================================================
           DESTINATION (right) — WordPress card
           Anchor of pipe at (450, 320)
           ===================================================== -->
      <g class="anim-float-b">
        <g transform="translate(320 300)">
          <!-- Drop shadow -->
          <rect x="4" y="6" width="180" height="160" rx="14" fill="#0c4a63" opacity="0.12"/>
          <!-- Card -->
          <rect x="0" y="0" width="180" height="160" rx="14" fill="url(#cardBg)" stroke="#cfdde5"/>
          <!-- Header -->
          <rect x="0" y="0" width="180" height="32" rx="14" fill="url(#dstHeader)"/>
          <rect x="0" y="16" width="180" height="16" fill="url(#dstHeader)"/>
          <!-- Window dots -->
          <circle cx="12" cy="16" r="3" fill="#ffffff" opacity="0.9"/>
          <circle cx="24" cy="16" r="3" fill="#ffffff" opacity="0.6"/>
          <circle cx="36" cy="16" r="3" fill="#ffffff" opacity="0.4"/>
          <!-- Title bar -->
          <rect x="50" y="13" width="78" height="6" rx="3" fill="#ffffff" opacity="0.85"/>
          <!-- Live dot -->
          <g transform="translate(160 16)">
            <circle r="4" fill="#4fd1a8"/>
            <circle r="4" fill="#4fd1a8" opacity="0.4">
              <animate attributeName="r" values="4;9;4" dur="2s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
            </circle>
          </g>

          <!-- WordPress "W" puck inside the card -->
          <g transform="translate(40 78)">
            <circle r="22" fill="#21759b"/>
            <circle r="22" fill="none" stroke="#ffffff" stroke-width="1.4" opacity="0.5"/>
            <g fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M -12 -5 L -5 10 L 0 -2"/>
              <path d="M 0 -2 L 5 10 L 12 -5"/>
            </g>
          </g>

          <!-- Title + subtitle bars, content bars -->
          <rect x="74" y="60" width="86" height="8"  rx="3" fill="#0e2230"/>
          <rect x="74" y="74" width="68" height="5"  rx="2.5" fill="#cfdde5"/>
          <rect x="74" y="84" width="78" height="5"  rx="2.5" fill="#dde6ec"/>

          <!-- Mini cards (posts migrated) -->
          <g transform="translate(20 110)">
            <rect x="0"  y="0" width="46" height="22" rx="5" fill="#eef7fc" stroke="#cfdde5"/>
            <rect x="6"  y="6" width="34" height="3.5" rx="1.5" fill="#21759b"/>
            <rect x="6"  y="14" width="22" height="2.5" rx="1.2" fill="#cfdde5"/>

            <rect x="54" y="0" width="46" height="22" rx="5" fill="#f3eeff" stroke="#cfdde5"/>
            <rect x="60" y="6" width="34" height="3.5" rx="1.5" fill="#7c6cf2"/>
            <rect x="60" y="14" width="22" height="2.5" rx="1.2" fill="#cfdde5"/>

            <rect x="108" y="0" width="46" height="22" rx="5" fill="#e8f8f0" stroke="#cfdde5"/>
            <rect x="114" y="6" width="34" height="3.5" rx="1.5" fill="#3fb98d"/>
            <rect x="114" y="14" width="22" height="2.5" rx="1.2" fill="#cfdde5"/>
          </g>

          <!-- Progress bar (migration progress) -->
          <g>
            <rect x="23" y="138" width="134" height="10" rx="5" fill="#eef3f6" stroke="#cfdde5"/>
            <g clip-path="url(#progressClip)">
              <rect class="progress-fill-rect" x="23" y="138" width="134" height="10" rx="5" fill="url(#dstHeader)"/>
            </g>
          </g>

          <!-- Shimmer sweep across destination -->
          <g clip-path="url(#dstClip)">
            <rect class="anim-shimmer" x="-80" y="0" width="60" height="160" fill="url(#shimmerGrad)" opacity="0.55"/>
          </g>
        </g>
      </g>

      <!-- =====================================================
           CENTER SHIELD — integrity check (the "without losing")
           Sits above the arc at (280, 250)
           ===================================================== -->
      <g class="anim-float-c">
        <g transform="translate(280 250)">
          <!-- Shield -->
          <path d="M 0 -42
                   L 36 -28
                   L 36 6
                   Q 36 30 0 46
                   Q -36 30 -36 6
                   L -36 -28 Z"
                fill="#ffffff" stroke="#21759b" stroke-width="2"/>
          <path d="M 0 -38
                   L 32 -25
                   L 32 5
                   Q 32 26 0 41
                   Q -32 26 -32 5
                   L -32 -25 Z"
                fill="url(#dstHeader)" opacity="0.12"/>
          <!-- Check mark -->
          <g class="anim-check">
            <path d="M -14 0 L -3 12 L 16 -10"
                  fill="none" stroke="#21759b" stroke-width="5"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </g>
        </g>
      </g>

      <!-- =====================================================
           BADGE HEXES — what gets preserved
           Top arc: SEO, DATA, MEDIA   (above the pipe)
           Bottom arc: REDIRECTS, USERS, SSL (below the pipe)
           Hex size: r=30 flat-top: pts (-26 -15)(0 -30)(26 -15)(26 15)(0 30)(-26 15)
           ===================================================== -->

      <!-- Connector lines from shield/pipe to badges (subtle) -->
      <g fill="none" stroke-linecap="round">
        <path d="M 280 208 Q 230 170 178 142" stroke="#3fb98d" stroke-width="1.6" opacity="0.28"/>
        <path d="M 280 208 Q 230 170 178 142" class="anim-dash-fwd" stroke="#3fb98d" stroke-width="1.8"/>

        <path d="M 280 208 L 280 122" stroke="#21759b" stroke-width="1.6" opacity="0.28"/>
        <path d="M 280 208 L 280 122" class="anim-dash-fwd" style="animation-delay:.3s" stroke="#21759b" stroke-width="1.8"/>

        <path d="M 280 208 Q 330 170 382 142" stroke="#f5a623" stroke-width="1.6" opacity="0.28"/>
        <path d="M 280 208 Q 330 170 382 142" class="anim-dash-fwd" style="animation-delay:.6s" stroke="#f5a623" stroke-width="1.8"/>

        <path d="M 200 380 Q 170 430 138 470" stroke="#7c6cf2" stroke-width="1.6" opacity="0.28"/>
        <path d="M 200 380 Q 170 430 138 470" class="anim-dash-fwd" style="animation-delay:.9s" stroke="#7c6cf2" stroke-width="1.8"/>

        <path d="M 280 388 L 280 470" stroke="#ff6b5b" stroke-width="1.6" opacity="0.28"/>
        <path d="M 280 388 L 280 470" class="anim-dash-fwd" style="animation-delay:1.2s" stroke="#ff6b5b" stroke-width="1.8"/>

        <path d="M 360 380 Q 390 430 422 470" stroke="#ef6ea8" stroke-width="1.6" opacity="0.28"/>
        <path d="M 360 380 Q 390 430 422 470" class="anim-dash-fwd" style="animation-delay:1.5s" stroke="#ef6ea8" stroke-width="1.8"/>
      </g>

      <!-- SEO badge (top-left) -->
      <g class="anim-float-a" style="animation-delay:-.2s">
        <g transform="translate(150 120)">
          <path d="M -26 -15 L 0 -30 L 26 -15 L 26 15 L 0 30 L -26 15 Z" fill="url(#badgeSeo)" stroke="#2ea077" stroke-width="1"/>
          <path d="M -22 -13 L 0 -26 L 22 -13" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
          <!-- magnifier icon -->
          <g transform="translate(-3 -3)" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round">
            <circle r="7"/>
            <path d="M 5 5 L 11 11"/>
          </g>
          <!-- Indicator dots -->
          <g transform="translate(0 44)">
            <circle cx="-8" cy="0" r="2" fill="#3fb98d" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2" fill="#3fb98d" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2" fill="#3fb98d" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- DATA badge (top-center) -->
      <g class="anim-float-b" style="animation-delay:-.5s">
        <g transform="translate(280 92)">
          <path d="M -26 -15 L 0 -30 L 26 -15 L 26 15 L 0 30 L -26 15 Z" fill="url(#badgeData)" stroke="#0c4a63" stroke-width="1"/>
          <!-- DB cylinder icon -->
          <g transform="translate(0 -4)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round">
            <ellipse cx="0" cy="-5" rx="9" ry="3" fill="#ffffff"/>
            <path d="M -9 -5 V 5 a 9 3 0 0 0 18 0 V -5" fill="#ffffff" opacity="0.0"/>
            <path d="M -9 -5 V 5 a 9 3 0 0 0 18 0 V -5"/>
            <path d="M -9 0 a 9 3 0 0 0 18 0" opacity="0.6"/>
          </g>
          <g transform="translate(0 44)">
            <circle cx="-8" cy="0" r="2" fill="#21759b" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2" fill="#21759b" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2" fill="#21759b" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- MEDIA badge (top-right) -->
      <g class="anim-float-c" style="animation-delay:-.8s">
        <g transform="translate(410 120)">
          <path d="M -26 -15 L 0 -30 L 26 -15 L 26 15 L 0 30 L -26 15 Z" fill="url(#badgeMedia)" stroke="#d68812" stroke-width="1"/>
          <!-- image icon -->
          <g transform="translate(0 -2)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
            <rect x="-10" y="-7" width="20" height="14" rx="2"/>
            <circle cx="-4" cy="-2" r="2" fill="#ffffff" stroke="none"/>
            <path d="M -10 5 L -2 -1 L 4 3 L 10 -2"/>
          </g>
          <g transform="translate(0 44)">
            <circle cx="-8" cy="0" r="2" fill="#f5a623" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2" fill="#f5a623" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2" fill="#f5a623" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- REDIRECTS badge (bottom-left) -->
      <g class="anim-float-a" style="animation-delay:-1.0s">
        <g transform="translate(120 488)">
          <path d="M -26 -15 L 0 -30 L 26 -15 L 26 15 L 0 30 L -26 15 Z" fill="url(#badgeRedir)" stroke="#5847d4" stroke-width="1"/>
          <!-- redirect arrow icon -->
          <g transform="translate(0 -2)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M -10 4 H 6 L 2 0 M 6 4 L 2 8"/>
            <path d="M 10 -4 H -2 L 2 -8 M -2 -4 L 2 0" opacity="0.7"/>
          </g>
          <g transform="translate(0 -44)">
            <circle cx="-8" cy="0" r="2" fill="#7c6cf2" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2" fill="#7c6cf2" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2" fill="#7c6cf2" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- USERS badge (bottom-center) -->
      <g class="anim-float-b" style="animation-delay:-1.3s">
        <g transform="translate(280 500)">
          <path d="M -26 -15 L 0 -30 L 26 -15 L 26 15 L 0 30 L -26 15 Z" fill="url(#badgeUsers)" stroke="#c0382e" stroke-width="1"/>
          <!-- users icon -->
          <g transform="translate(0 -2)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round">
            <circle cx="-5" cy="-4" r="3.5" fill="#ffffff"/>
            <circle cx="6"  cy="-3" r="3" fill="#ffffff" opacity="0.85"/>
            <path d="M -12 8 a 7 5 0 0 1 14 0" stroke-linejoin="round"/>
            <path d="M 0 8 a 6 4 0 0 1 12 0" opacity="0.85" stroke-linejoin="round"/>
          </g>
          <g transform="translate(0 -44)">
            <circle cx="-8" cy="0" r="2" fill="#ff6b5b" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2" fill="#ff6b5b" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2" fill="#ff6b5b" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- SSL badge (bottom-right) -->
      <g class="anim-float-c" style="animation-delay:-1.6s">
        <g transform="translate(440 488)">
          <path d="M -26 -15 L 0 -30 L 26 -15 L 26 15 L 0 30 L -26 15 Z" fill="url(#badgeSsl)" stroke="#b94a82" stroke-width="1"/>
          <!-- lock icon -->
          <g transform="translate(0 -2)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="-7" y="0" width="14" height="10" rx="2" fill="#ffffff" stroke="none"/>
            <path d="M -4 0 V -4 a 4 4 0 0 1 8 0 V 0"/>
            <circle cx="0" cy="5" r="1.4" fill="#ef6ea8" stroke="none"/>
          </g>
          <g transform="translate(0 -44)">
            <circle cx="-8" cy="0" r="2" fill="#ef6ea8" opacity="0.9"/>
            <circle cx="0"  cy="0" r="2" fill="#ef6ea8" opacity="0.5"/>
            <circle cx="8"  cy="0" r="2" fill="#ef6ea8" opacity="0.25"/>
          </g>
        </g>
      </g>

      <!-- =====================================================
           CORNER ATMOSPHERE — code chip + status pill
           ===================================================== -->
      <!-- 301 chip (top-left atmosphere) -->
      <g class="anim-float-a" style="animation-delay:-.4s">
        <g transform="translate(40 240)">
          <rect width="92" height="28" rx="14" fill="#ffffff" stroke="#cfdde5"/>
          <g transform="translate(15 14)" stroke="#21759b" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M -7 -4 H 5 L 1 -8 M 5 -4 L 1 0"/>
            <path d="M 7 4 H -5 L -1 8 M -5 4 L -1 0" opacity="0.6"/>
          </g>
          <!-- "code line" bars representing 301 redirect text -->
          <rect x="34" y="9"  width="44" height="4" rx="2" fill="#21759b" opacity="0.85"/>
          <rect x="34" y="17" width="30" height="4" rx="2" fill="#cfdde5"/>
        </g>
      </g>

      <!-- Spinning gear (top-right atmosphere) -->
      <g transform="translate(490 240)">
        <g class="anim-spin">
          <circle r="22" fill="#ffffff" stroke="#cfdde5" stroke-width="1.4"/>
          <circle r="9" fill="#21759b"/>
          <circle r="4" fill="#0c4a63"/>
          <g fill="#21759b">
            <rect x="-2.5" y="-26" width="5" height="7" rx="1.5"/>
            <rect x="-2.5" y="19"  width="5" height="7" rx="1.5"/>
            <rect x="-26" y="-2.5" width="7" height="5" rx="1.5"/>
            <rect x="19"  y="-2.5" width="7" height="5" rx="1.5"/>
            <rect x="-21" y="-21" width="7" height="5" rx="1.5" transform="rotate(45)"/>
            <rect x="14"  y="-21" width="7" height="5" rx="1.5" transform="rotate(45)"/>
            <rect x="-21" y="16"  width="7" height="5" rx="1.5" transform="rotate(45)"/>
            <rect x="14"  y="16"  width="7" height="5" rx="1.5" transform="rotate(45)"/>
          </g>
        </g>
      </g>

      <!-- Connecting accent dots -->
      <g>
        <circle class="anim-dot" cx="280" cy="40"  r="3" fill="#7c6cf2"/>
        <circle class="anim-dot" style="animation-delay:.4s" cx="40"  cy="180" r="2.5" fill="#21759b"/>
        <circle class="anim-dot" style="animation-delay:.8s" cx="520" cy="180" r="2.5" fill="#3fb98d"/>
        <circle class="anim-dot" style="animation-delay:1.2s" cx="280" cy="540" r="3" fill="#ff6b5b"/>

    </svg>
  </div>
