<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>WordPress Build & Launch — Hero Vector</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --wp-blue: #21759b;
    --wp-blue-deep: #135e7c;
    --wp-blue-darker: #0c4a63;
    --wp-blue-light: #4a9bc4;
    --wp-blue-soft: #d6ecf6;
    --ink: #0e2230;
    --ink-soft: #1c3a4f;
    --paper: #ffffff;
    --paper-warm: #f7fafc;
    --accent-coral: #ff6b5b;
    --accent-amber: #ffb74a;
    --accent-mint: #4fd1a8;
    --accent-violet: #7c6cf2;
    --shadow: rgba(12, 74, 99, 0.18);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% 20%, #eef7fc 0%, transparent 60%),
      radial-gradient(900px 500px at 10% 90%, #f0e9ff 0%, transparent 60%),
      #fbfdff;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ------ Hero demo wrapper (so the vector has context) ------ */
  .hero {
    max-width: 1320px;
    margin: 0 auto;
    padding: 56px 48px 80px;
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 32px;
    align-items: center;
    min-height: 100vh;
  }

  .hero-copy .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--wp-blue);
    background: var(--wp-blue-soft);
    padding: 6px 12px;
    border-radius: 999px;
  }
  .hero-copy .eyebrow::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-mint);
    box-shadow: 0 0 0 4px rgba(79, 209, 168, 0.2);
  }
  .hero-copy h1 {
    font-size: clamp(36px, 4.4vw, 60px);
    line-height: 1.04;
    letter-spacing: -0.025em;
    font-weight: 800;
    margin: 18px 0 18px;
    text-wrap: pretty;
  }
  .hero-copy h1 em {
    font-style: normal;
    background: linear-gradient(120deg, var(--wp-blue) 0%, var(--accent-violet) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hero-copy p {
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 48ch;
    margin: 0 0 28px;
  }
  .hero-cta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn {
    font: inherit;
    font-weight: 600;
    font-size: 15px;
    padding: 14px 22px;
    border-radius: 12px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary {
    background: var(--wp-blue);
    color: white;
    box-shadow: 0 8px 20px -8px rgba(33,117,155,0.7);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 24px -8px rgba(33,117,155,0.7); }
  .btn-ghost {
    background: white;
    color: var(--ink);
    border-color: #d9e3ea;
  }
  .btn-ghost:hover { border-color: var(--wp-blue); color: var(--wp-blue); }

  /* ------ Vector stage ------ */
  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 10;
  }
  .stage svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  /* ------ Animations ------ */
  @keyframes float-a {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-8px) rotate(0.4deg); }
  }
  @keyframes float-b {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }
  @keyframes float-c {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  @keyframes rocket-bob {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(-2px, -10px); }
  }
  @keyframes flame-flicker {
    0%, 100% { transform: scaleY(1) scaleX(1); opacity: 0.95; }
    50%      { transform: scaleY(1.18) scaleX(0.92); opacity: 1; }
  }
  @keyframes spark {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translateY(40px) scale(0.4); opacity: 0; }
  }
  @keyframes ring-pulse {
    0%   { transform: scale(0.9); opacity: 0.55; }
    100% { transform: scale(1.45); opacity: 0; }
  }
  @keyframes cursor-tap {
    0%, 60%, 100% { transform: translate(0, 0); }
    70%, 80%      { transform: translate(-2px, 2px); }
  }
  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(220%); }
  }

  .anim-float-a { animation: float-a 5.5s ease-in-out infinite; transform-origin: center; }
  .anim-float-b { animation: float-b 6.2s ease-in-out infinite; transform-origin: center; }
  .anim-float-c { animation: float-c 4.8s ease-in-out infinite; transform-origin: center; }
  .anim-rocket  { animation: rocket-bob 3.2s ease-in-out infinite; transform-origin: center; }
  .anim-flame   { animation: flame-flicker 0.45s ease-in-out infinite; transform-origin: 50% 0%; }
  .anim-spark   { animation: spark 1.6s ease-out infinite; transform-origin: center; }
  .anim-ring    { animation: ring-pulse 2.4s ease-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-cursor  { animation: cursor-tap 3s ease-in-out infinite; transform-origin: center; }

  @media (prefers-reduced-motion: reduce) {
    .anim-float-a, .anim-float-b, .anim-float-c, .anim-rocket,
    .anim-flame, .anim-spark, .anim-ring, .anim-cursor {
      animation: none;
    }
  }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; padding: 32px 20px 60px; }
    .hero-copy { order: 2; }
    .stage { order: 1; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-copy">
    <span class="eyebrow">WordPress Studio</span>
    <h1>Build &amp; <em>launch</em> your WordPress site &mdash; in days, not months.</h1>
    <p>From blank canvas to liftoff. Drag, drop, and deploy with a build kit that&rsquo;s purpose&#8209;built for the world&rsquo;s most popular CMS.</p>
    <div class="hero-cta">
      <button class="btn btn-primary">Start building</button>
      <button class="btn btn-ghost">See a demo</button>
    </div>
  </div>

  <div class="stage" aria-label="Isometric illustration of a WordPress workbench with a launching rocket">
    <!-- viewBox uses an isometric-friendly canvas. Origin is roughly center. -->
    <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img">
      <defs>
        <!-- Platform gradient -->
        <linearGradient id="platTop" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#eaf3f8"/>
        </linearGradient>
        <linearGradient id="platSide" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#cfe1ec"/>
          <stop offset="100%" stop-color="#9bbccd"/>
        </linearGradient>
        <linearGradient id="platFront" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#bcd5e2"/>
          <stop offset="100%" stop-color="#86adc1"/>
        </linearGradient>

        <!-- Blue cube faces for WP cylinder -->
        <linearGradient id="wpTop" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3a96bf"/>
          <stop offset="100%" stop-color="#21759b"/>
        </linearGradient>
        <linearGradient id="wpSide" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a6486"/>
          <stop offset="100%" stop-color="#0c4a63"/>
        </linearGradient>

        <!-- Browser card -->
        <linearGradient id="cardSide" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#dfe9ef"/>
          <stop offset="100%" stop-color="#a8c0cd"/>
        </linearGradient>

        <!-- Rocket body -->
        <linearGradient id="rocketBody" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"  stop-color="#ffffff"/>
          <stop offset="50%" stop-color="#f1f6f9"/>
          <stop offset="100%" stop-color="#c9d8e1"/>
        </linearGradient>
        <linearGradient id="rocketNose" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff8a7d"/>
          <stop offset="100%" stop-color="#ff6b5b"/>
        </linearGradient>
        <linearGradient id="rocketFin" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff8a7d"/>
          <stop offset="100%" stop-color="#e04a3a"/>
        </linearGradient>
        <linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#fff2c4"/>
          <stop offset="40%" stop-color="#ffb74a"/>
          <stop offset="100%" stop-color="#ff6b5b" stop-opacity="0"/>
        </linearGradient>

        <!-- Block tints -->
        <linearGradient id="blockMint" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7ee0bf"/>
          <stop offset="100%" stop-color="#3fb98d"/>
        </linearGradient>
        <linearGradient id="blockViolet" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#9d8ff8"/>
          <stop offset="100%" stop-color="#6a58e6"/>
        </linearGradient>
        <linearGradient id="blockAmber" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffd06b"/>
          <stop offset="100%" stop-color="#f5a623"/>
        </linearGradient>

        <!-- Soft ground shadow -->
        <radialGradient id="groundShadow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stop-color="#0c4a63" stop-opacity="0.22"/>
          <stop offset="60%" stop-color="#0c4a63" stop-opacity="0.06"/>
          <stop offset="100%" stop-color="#0c4a63" stop-opacity="0"/>
        </radialGradient>

        <!-- Window shimmer -->
        <linearGradient id="shimmerGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="white" stop-opacity="0"/>
          <stop offset="50%" stop-color="white" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>

        <!-- Rocket trail dotted line -->
        <linearGradient id="trailGrad" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%"  stop-color="#21759b" stop-opacity="0"/>
          <stop offset="100%" stop-color="#21759b" stop-opacity="0.45"/>
        </linearGradient>

        <!-- Clip for rocket body shimmer (square fallback) -->
        <clipPath id="cardClip">
          <rect x="0" y="0" width="170" height="110" rx="8"/>
        </clipPath>
      </defs>

      <!-- =========================================================
           GROUND SHADOW (soft ellipse beneath platform)
           ========================================================= -->
      <ellipse cx="400" cy="430" rx="320" ry="40" fill="url(#groundShadow)"/>

      <!-- =========================================================
           ISOMETRIC PLATFORM (the "workbench")
           Iso angles: 30deg. We draw flat in screen space using
           skewed parallelograms.
           ========================================================= -->
      <g id="platform">
        <!-- Top face (rhombus) -->
        <path d="M 400 280
                 L 660 360
                 L 400 440
                 L 140 360 Z"
              fill="url(#platTop)" stroke="#bdd3de" stroke-width="1.2"/>

        <!-- Right side face -->
        <path d="M 660 360
                 L 660 388
                 L 400 468
                 L 400 440 Z"
              fill="url(#platSide)"/>

        <!-- Left/front side face -->
        <path d="M 140 360
                 L 140 388
                 L 400 468
                 L 400 440 Z"
              fill="url(#platFront)"/>

        <!-- Subtle grid lines on top -->
        <g opacity="0.35" stroke="#9fbfcf" stroke-width="0.8" fill="none">
          <path d="M 270 320 L 530 400"/>
          <path d="M 335 300 L 595 380"/>
          <path d="M 205 340 L 465 420"/>
          <path d="M 335 420 L 595 340"/>
          <path d="M 270 440 L 530 360"/>
          <path d="M 205 380 L 465 300"/>
        </g>

        <!-- Pulse rings on the platform under the WP logo -->
        <g transform="translate(400 360)">
          <ellipse class="anim-ring" cx="0" cy="0" rx="60" ry="22"
                   fill="none" stroke="#21759b" stroke-width="1.6" opacity="0.5"/>
          <ellipse class="anim-ring" cx="0" cy="0" rx="60" ry="22" style="animation-delay:1.2s"
                   fill="none" stroke="#21759b" stroke-width="1.6" opacity="0.5"/>
        </g>
      </g>

      <!-- =========================================================
           BACK-LEFT: BROWSER WINDOW (the "site being built")
           ========================================================= -->
      <g class="anim-float-a" style="animation-delay:.2s">
        <g transform="translate(180 175)">
          <!-- Side (depth) -->
          <path d="M 0 18
                   L 14 26
                   L 14 142
                   L 0 134 Z"
                fill="url(#cardSide)"/>
          <path d="M 0 134
                   L 14 142
                   L 184 60
                   L 170 52 Z"
                fill="#94b3c2"/>
          <!-- Front face (the screen) -->
          <rect x="0" y="0" width="170" height="118" rx="8" fill="#ffffff" stroke="#cfdde5"/>
          <!-- Title bar -->
          <rect x="0" y="0" width="170" height="18" rx="8" fill="#eef4f8"/>
          <rect x="0" y="10" width="170" height="8" fill="#eef4f8"/>
          <circle cx="10" cy="9" r="3" fill="#ff6b5b"/>
          <circle cx="22" cy="9" r="3" fill="#ffb74a"/>
          <circle cx="34" cy="9" r="3" fill="#4fd1a8"/>
          <rect x="60" y="5" width="80" height="8" rx="4" fill="#dfe7ec"/>

          <!-- Page content placeholders -->
          <rect x="12" y="28" width="60" height="38" rx="4" fill="#21759b"/>
          <rect x="20" y="36" width="36" height="4" rx="2" fill="#ffffff" opacity="0.85"/>
          <rect x="20" y="44" width="44" height="3" rx="1.5" fill="#ffffff" opacity="0.55"/>
          <rect x="20" y="50" width="28" height="3" rx="1.5" fill="#ffffff" opacity="0.55"/>

          <rect x="80" y="28" width="78" height="14" rx="3" fill="#e7eef3"/>
          <rect x="80" y="46" width="78" height="6" rx="2" fill="#eef3f6"/>
          <rect x="80" y="56" width="60" height="6" rx="2" fill="#eef3f6"/>

          <rect x="12" y="74" width="46" height="34" rx="4" fill="#f3f7fa" stroke="#e1ebf0"/>
          <rect x="62" y="74" width="46" height="34" rx="4" fill="#f3f7fa" stroke="#e1ebf0"/>
          <rect x="112" y="74" width="46" height="34" rx="4" fill="#f3f7fa" stroke="#e1ebf0"/>

          <!-- Tiny icons inside cards -->
          <circle cx="35" cy="86" r="4" fill="#7c6cf2"/>
          <rect x="22" y="96" width="26" height="3" rx="1.5" fill="#cfdde5"/>
          <circle cx="85" cy="86" r="4" fill="#4fd1a8"/>
          <rect x="72" y="96" width="26" height="3" rx="1.5" fill="#cfdde5"/>
          <circle cx="135" cy="86" r="4" fill="#ffb74a"/>
          <rect x="122" y="96" width="26" height="3" rx="1.5" fill="#cfdde5"/>

          <!-- Shimmer sweep on the screen -->
          <g clip-path="url(#cardClip)">
            <rect x="-60" y="18" width="60" height="100" fill="url(#shimmerGrad)" opacity="0.6">
              <animateTransform attributeName="transform" type="translate"
                                values="-60 0; 230 0" dur="3.5s" repeatCount="indefinite"/>
            </rect>
          </g>
        </g>
      </g>

      <!-- =========================================================
           CENTER: WORDPRESS LOGO PUCK (isometric cylinder)
           ========================================================= -->
      <g id="wp-puck" class="anim-float-b">
        <g transform="translate(400 295)">
          <!-- Cylinder side -->
          <path d="M -70 0
                   C -70 22 -38 36 0 36
                   C 38 36 70 22 70 0
                   L 70 -22
                   C 70 0 38 14 0 14
                   C -38 14 -70 0 -70 -22 Z"
                fill="url(#wpSide)"/>
          <!-- Cylinder top ellipse -->
          <ellipse cx="0" cy="-22" rx="70" ry="22" fill="url(#wpTop)" stroke="#0c4a63" stroke-width="0.8"/>
          <!-- Inner ring -->
          <ellipse cx="0" cy="-22" rx="60" ry="18.5" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.45"/>

          <!-- WordPress 'W' mark, projected onto the top.
               Original W glyph drawn upright then squashed via scale(1, 0.32)
               + translated up so its center sits on the puck top. -->
          <g transform="translate(0 -22) scale(1 0.34)">
            <!-- Outer circle (white) -->
            <circle r="46" fill="#ffffff"/>
            <!-- Blue inner ring/gap -->
            <circle r="46" fill="none" stroke="#0c4a63" stroke-width="2.2" opacity="0.25"/>
            <!-- Stylized W (three strokes) -->
            <g fill="none" stroke="#21759b" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M -30 -16 L -16 22 L -2 -8"/>
              <path d="M -2 -8 L 12 22 L 26 -16"/>
            </g>
            <!-- Center vertical accent -->
            <path d="M -2 -8 L -2 -22" stroke="#21759b" stroke-width="6" stroke-linecap="round"/>
          </g>
        </g>
      </g>

      <!-- =========================================================
           RIGHT: STACKED GUTENBERG BLOCKS (isometric cubes)
           ========================================================= -->
      <!-- Block A: mint, lower -->
      <g class="anim-float-c">
        <g transform="translate(545 295)">
          <!-- Top -->
          <path d="M 0 0 L 50 -16 L 100 0 L 50 16 Z" fill="url(#blockMint)"/>
          <!-- Right face -->
          <path d="M 100 0 L 100 36 L 50 52 L 50 16 Z" fill="#2ea077"/>
          <!-- Left face -->
          <path d="M 0 0 L 0 36 L 50 52 L 50 16 Z" fill="#3fb98d"/>
          <!-- Plus icon on top -->
          <g transform="translate(50 0) scale(1 0.5)" stroke="#ffffff" stroke-width="3" stroke-linecap="round">
            <path d="M -7 0 L 7 0"/>
            <path d="M 0 -7 L 0 7"/>
          </g>
        </g>
      </g>

      <!-- Block B: violet, middle, slightly back -->
      <g class="anim-float-a" style="animation-delay:.6s">
        <g transform="translate(560 240)">
          <path d="M 0 0 L 45 -14 L 90 0 L 45 14 Z" fill="url(#blockViolet)"/>
          <path d="M 90 0 L 90 32 L 45 46 L 45 14 Z" fill="#5847d4"/>
          <path d="M 0 0 L 0 32 L 45 46 L 45 14 Z" fill="#6a58e6"/>
          <!-- Code brackets icon on top -->
          <g transform="translate(45 0) scale(1 0.5)" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M -10 -5 L -16 0 L -10 5"/>
            <path d="M 10 -5 L 16 0 L 10 5"/>
          </g>
        </g>
      </g>

      <!-- Block C: amber, top, floating higher -->
      <g class="anim-float-b" style="animation-delay:.4s">
        <g transform="translate(605 188)">
          <path d="M 0 0 L 38 -12 L 76 0 L 38 12 Z" fill="url(#blockAmber)"/>
          <path d="M 76 0 L 76 26 L 38 38 L 38 12 Z" fill="#d68812"/>
          <path d="M 0 0 L 0 26 L 38 38 L 38 12 Z" fill="#f5a623"/>
          <!-- Image icon on top -->
          <g transform="translate(38 0) scale(1 0.5)" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linejoin="round">
            <rect x="-9" y="-6" width="18" height="12" rx="1.5"/>
            <circle cx="-3" cy="-2" r="1.5" fill="#ffffff" stroke="none"/>
            <path d="M -9 4 L -2 -1 L 4 3 L 9 0"/>
          </g>
        </g>
      </g>

      <!-- =========================================================
           LEFT: WRENCH (build tool) leaning against platform
           ========================================================= -->
      <g class="anim-float-c" style="animation-delay:.8s">
        <g transform="translate(120 320) rotate(-22)">
          <!-- Handle -->
          <rect x="0" y="-6" width="80" height="12" rx="6" fill="#4a9bc4"/>
          <rect x="6" y="-6" width="60" height="2" fill="#ffffff" opacity="0.35"/>
          <!-- Head -->
          <path d="M 80 -14
                   a 16 16 0 1 1 0 28
                   L 80 8
                   a 8 8 0 0 0 0 -16 Z"
                fill="#21759b"/>
          <circle cx="86" cy="0" r="4" fill="#0c4a63"/>
        </g>
      </g>

      <!-- =========================================================
           CURSOR (interaction cue) hovering near the WP puck
           ========================================================= -->
      <g class="anim-cursor">
        <g transform="translate(335 250)">
          <path d="M 0 0 L 14 4 L 6 7 L 9 16 L 5 17 L 2 9 L -3 12 Z"
                fill="#0e2230" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round"/>
        </g>
      </g>

      <!-- =========================================================
           ROCKET (back-right, launching up off the platform)
           ========================================================= -->
      <!-- Trail dots -->
      <g opacity="0.55">
        <circle cx="475" cy="280" r="2.6" fill="#21759b"/>
        <circle cx="473" cy="265" r="2.2" fill="#21759b" opacity="0.8"/>
        <circle cx="471" cy="248" r="1.8" fill="#21759b" opacity="0.6"/>
        <circle cx="469" cy="230" r="1.5" fill="#21759b" opacity="0.4"/>
        <circle cx="467" cy="210" r="1.2" fill="#21759b" opacity="0.25"/>
      </g>

      <g class="anim-rocket">
        <g transform="translate(478 130)">
          <!-- Flame (under body) -->
          <g>
            <path d="M -10 58
                     Q -14 78 0 96
                     Q 14 78 10 58 Z"
                  fill="url(#flameGrad)"/>
            <path d="M -5 60
                     Q -7 76 0 88
                     Q 7 76 5 60 Z"
                  fill="#ffe28a" opacity="0.95"/>
          </g>

          <!-- Sparks falling from flame -->
          <g>
            <circle class="anim-spark" cx="-6" cy="92" r="2" fill="#ffb74a"/>
            <circle class="anim-spark" cx="6"  cy="92" r="1.6" fill="#ff6b5b" style="animation-delay:.4s"/>
            <circle class="anim-spark" cx="0"  cy="96" r="1.4" fill="#ffd06b" style="animation-delay:.8s"/>
            <circle class="anim-spark" cx="-3" cy="94" r="1.2" fill="#ffb74a" style="animation-delay:1.2s"/>
          </g>

          <!-- Body (bullet shape) -->
          <path d="M -16 0
                   Q -16 -32 0 -52
                   Q 16 -32 16 0
                   L 16 56
                   Q 0 64 -16 56 Z"
                fill="url(#rocketBody)" stroke="#9bbccd" stroke-width="1"/>

          <!-- Center seam -->
          <path d="M 0 -50 L 0 60" stroke="#cfdde5" stroke-width="0.8"/>

          <!-- Nose cone (coral) -->
          <path d="M -16 -2
                   Q -16 -32 0 -52
                   Q 16 -32 16 -2 Z"
                fill="url(#rocketNose)"/>
          <!-- Nose tip highlight -->
          <path d="M -4 -42 Q 0 -50 4 -42" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.7"/>

          <!-- Window: WordPress blue porthole with W -->
          <circle cx="0" cy="6" r="11" fill="#0c4a63"/>
          <circle cx="0" cy="6" r="9" fill="#21759b"/>
          <circle cx="-3" cy="3" r="3" fill="#ffffff" opacity="0.45"/>
          <!-- Tiny W -->
          <g stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none">
            <path d="M -5 4 L -2.5 9 L 0 5.5"/>
            <path d="M 0 5.5 L 2.5 9 L 5 4"/>
          </g>

          <!-- Side fins -->
          <path d="M -16 30 L -28 56 L -16 56 Z" fill="url(#rocketFin)"/>
          <path d="M  16 30 L  28 56 L  16 56 Z" fill="url(#rocketFin)"/>

          <!-- Rivet detail -->
          <circle cx="0" cy="32" r="1.4" fill="#9bbccd"/>
          <circle cx="0" cy="44" r="1.4" fill="#9bbccd"/>
        </g>
      </g>

      <!-- =========================================================
           FLOATING MICRO-ELEMENTS (depth/atmosphere)
           ========================================================= -->
      <g opacity="0.85">
        <!-- Tiny code chip -->
        <g class="anim-float-a" style="animation-delay:1s">
          <g transform="translate(290 150)">
            <rect x="0" y="0" width="44" height="20" rx="4" fill="#ffffff" stroke="#cfdde5"/>
            <path d="M 8 10 L 12 6 L 12 14 Z" fill="#21759b"/>
            <path d="M 36 10 L 32 6 L 32 14 Z" fill="#21759b"/>
            <rect x="16" y="8" width="12" height="4" rx="1" fill="#cfdde5"/>
          </g>
        </g>

        <!-- Tiny "Live" pill -->
        <g class="anim-float-c" style="animation-delay:1.4s">
          <g transform="translate(620 110)">
            <rect x="0" y="0" width="58" height="22" rx="11" fill="#ffffff" stroke="#cfdde5"/>
            <circle cx="11" cy="11" r="4" fill="#4fd1a8"/>
            <circle cx="11" cy="11" r="4" fill="#4fd1a8" opacity="0.4">
              <animate attributeName="r" values="4;9;4" dur="2s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
            </circle>
            <text x="20" y="15" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#0e2230">LIVE</text>
          </g>
        </g>

        <!-- Tiny gear -->
        <g class="anim-float-b" style="animation-delay:.2s">
          <g transform="translate(700 250)">
            <g>
              <circle r="11" fill="#ffffff" stroke="#cfdde5"/>
              <circle r="4" fill="#21759b"/>
              <g fill="#21759b">
                <rect x="-1.5" y="-13" width="3" height="5" rx="1"/>
                <rect x="-1.5" y="8" width="3" height="5" rx="1"/>
                <rect x="-13" y="-1.5" width="5" height="3" rx="1"/>
                <rect x="8" y="-1.5" width="5" height="3" rx="1"/>
              </g>
              <animateTransform attributeName="transform" type="rotate"
                                from="0" to="360" dur="14s" repeatCount="indefinite"/>
            </g>
          </g>
        </g>
      </g>

    </svg>
  </div>
</section>
