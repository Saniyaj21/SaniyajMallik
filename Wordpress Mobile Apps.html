<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>iOS & Android Apps — Hero Vector</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --wp-blue: #21759b;
    --wp-blue-deep: #135e7c;
    --wp-blue-darker: #0c4a63;
    --wp-blue-light: #4a9bc4;
    --wp-blue-soft: #d6ecf6;
    --ink: #0e2230;
    --ink-soft: #1c3a4f;
    --accent-coral: #ff6b5b;
    --accent-amber: #ffb74a;
    --accent-mint: #4fd1a8;
    --accent-violet: #7c6cf2;
    --accent-pink: #ef6ea8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background: #fff; color: var(--ink); min-height: 100vh; }

  .hero {
    max-width: 1340px; margin: 0 auto; padding: 56px 48px 80px;
    display: grid; grid-template-columns: 1fr 1.15fr; gap: 48px;
    align-items: center; min-height: 100vh;
  }
  .hero-num { display: inline-block; font-size: 13px; font-weight: 700; letter-spacing: .14em; color: #8aa3b3; margin-bottom: 10px; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--wp-blue); background: var(--wp-blue-soft);
    padding: 6px 12px; border-radius: 999px;
  }
  .eyebrow::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-mint); box-shadow: 0 0 0 4px rgba(79,209,168,.22); }
  h1 {
    font-size: clamp(40px, 5vw, 68px); line-height: 1.02; letter-spacing: -.028em;
    font-weight: 800; margin: 18px 0 18px; color: var(--ink); text-wrap: pretty;
  }
  h1 .grad { background: linear-gradient(120deg, var(--wp-blue) 0%, var(--accent-mint) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
  p { font-size: 18px; line-height: 1.55; color: var(--ink-soft); max-width: 52ch; margin: 0 0 28px; }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn { font: inherit; font-weight: 600; font-size: 15px; padding: 14px 22px; border-radius: 12px; border: 1px solid transparent; cursor: pointer; transition: transform .15s, box-shadow .15s; }
  .btn-primary { background: var(--wp-blue); color: white; box-shadow: 0 8px 20px -8px rgba(33,117,155,.7); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 24px -8px rgba(33,117,155,.7); }
  .btn-ghost { background: white; color: var(--ink); border-color: #d9e3ea; }
  .btn-ghost:hover { border-color: var(--wp-blue); color: var(--wp-blue); }

  .stage { position: relative; width: 100%; aspect-ratio: 1/1; max-height: 660px; display: flex; align-items: center; justify-content: center; }
  .stage svg { width: 100%; height: 100%; display: block; overflow: visible; }

  /* Animations */
  @keyframes float-y       { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-10px);} }
  @keyframes float-y-soft  { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-5px);} }
  @keyframes tilt-l        { 0%,100% { transform: rotate(-8deg);} 50% { transform: rotate(-6deg);} }
  @keyframes tilt-r        { 0%,100% { transform: rotate(8deg);}  50% { transform: rotate(6deg);} }
  @keyframes dash-flow     { to { stroke-dashoffset: -48; } }
  @keyframes pulse-ring    { 0% { transform: scale(.5); opacity: .7;} 100% { transform: scale(1.6); opacity: 0;} }
  @keyframes spin-slow     { to { transform: rotate(360deg); } }
  @keyframes blink         { 0%, 88%, 100% { opacity: 1;} 92%, 96% { opacity: .25;} }
  @keyframes notif-in {
    0%   { transform: translateY(-8px); opacity: 0; }
    8%   { transform: translateY(0); opacity: 1; }
    70%  { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-4px); opacity: 0; }
  }
  @keyframes scroll-feed   { 0% { transform: translateY(0);} 50% { transform: translateY(-22px);} 100% { transform: translateY(0);} }
  @keyframes pop-dot       { 0%,100% { opacity: .35; transform: scale(.9);} 50% { opacity: 1; transform: scale(1.05);} }
  @keyframes bar-grow      { 0%,100% { transform: scaleY(.4);} 50% { transform: scaleY(1);} }
  @keyframes orbit-1       { to { transform: rotate(360deg); } }

  .anim-float-l    { animation: tilt-l 6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-r    { animation: tilt-r 6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-y    { animation: float-y 6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-float-soft { animation: float-y-soft 5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-dash       { stroke-dasharray: 6 6; animation: dash-flow 2.4s linear infinite; }
  .anim-pulse      { animation: pulse-ring 3s cubic-bezier(.25,.6,.35,1) infinite; transform-origin: center; transform-box: fill-box; }
  .anim-spin       { animation: spin-slow 28s linear infinite; transform-origin: center; transform-box: fill-box; }
  .anim-blink      { animation: blink 4s ease-in-out infinite; }
  .anim-notif      { animation: notif-in 4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-feed       { animation: scroll-feed 6s ease-in-out infinite; }
  .anim-dot        { animation: pop-dot 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .anim-bar        { animation: bar-grow 3s ease-in-out infinite; transform-origin: bottom center; transform-box: fill-box; }

  @media (prefers-reduced-motion: reduce) { [class*="anim-"] { animation: none; } }
  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; padding: 32px 20px 60px; }
    .hero-copy { order: 2; } .stage { order: 1; max-height: 520px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-copy">
    <span class="hero-num">№ 03</span>
    <div><span class="eyebrow">Mobile Apps · iOS &amp; Android</span></div>
    <h1>iOS &amp;<br><span class="grad">Android Apps</span></h1>
    <p>One codebase, both stores, your brand in every pocket. We ship native-feeling apps with a single backend — same content, same logins, same data, on every device.</p>
    <div class="hero-cta">
      <button class="btn btn-primary">Plan my app</button>
      <button class="btn btn-ghost">See app showcase</button>
    </div>
  </div>

  <div class="stage" aria-label="Two phones side by side, an iPhone with iOS app and an Android with the same app, sharing a synced backend with notifications, charts and content flowing between them">
    <svg viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg" role="img">
      <defs>
        <linearGradient id="bgRing" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#21759b"/>
          <stop offset="100%" stop-color="#4fd1a8"/>
        </linearGradient>
        <linearGradient id="iosScreen" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#eef7fc"/>
        </linearGradient>
        <linearGradient id="androidScreen" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#eaf6f0"/>
        </linearGradient>
        <linearGradient id="bezelDark" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1c3a4f"/>
          <stop offset="100%" stop-color="#0c4a63"/>
        </linearGradient>
        <linearGradient id="headerBlue" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#21759b"/>
          <stop offset="100%" stop-color="#7c6cf2"/>
        </linearGradient>
        <linearGradient id="headerMint" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#21759b"/>
          <stop offset="100%" stop-color="#3fb98d"/>
        </linearGradient>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#21759b" stop-opacity=".18"/>
          <stop offset="100%" stop-color="#21759b" stop-opacity="0"/>
        </radialGradient>
        <pattern id="dotgrid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="1" fill="#cfdde5" opacity=".55"/>
        </pattern>
        <clipPath id="iosClip"><rect x="118" y="158" width="120" height="244" rx="22"/></clipPath>
        <clipPath id="androidClip"><rect x="322" y="170" width="120" height="244" rx="14"/></clipPath>
      </defs>

      <!-- Backdrop -->
      <rect x="40" y="40" width="480" height="480" rx="28" fill="url(#dotgrid)" opacity=".7"/>
      <circle cx="280" cy="280" r="240" fill="url(#centerGlow)"/>
      <!-- Schematic corners -->
      <g stroke="#21759b" stroke-width="1.4" fill="none" opacity=".55" stroke-linecap="round">
        <path d="M 40 70 V 40 H 70"/>
        <path d="M 490 40 H 520 V 70"/>
        <path d="M 520 490 V 520 H 490"/>
        <path d="M 70 520 H 40 V 490"/>
      </g>

      <!-- Sync arc connecting both phones (under) -->
      <g fill="none" stroke-linecap="round">
        <!-- arc from iOS top toward center cloud -->
        <path d="M 178 158 Q 230 90, 280 110" stroke="#7c6cf2" stroke-width="2" opacity=".25"/>
        <path d="M 178 158 Q 230 90, 280 110" class="anim-dash" stroke="#7c6cf2" stroke-width="2"/>
        <!-- arc from Android top toward center cloud -->
        <path d="M 382 170 Q 330 92, 280 110" stroke="#3fb98d" stroke-width="2" opacity=".25"/>
        <path d="M 382 170 Q 330 92, 280 110" class="anim-dash" style="animation-delay:.6s" stroke="#3fb98d" stroke-width="2"/>

        <!-- bottom: WP backend connection -->
        <path d="M 178 402 Q 230 480, 280 460" stroke="#21759b" stroke-width="2" opacity=".25"/>
        <path d="M 178 402 Q 230 480, 280 460" class="anim-dash" style="animation-delay:.3s" stroke="#21759b" stroke-width="2"/>
        <path d="M 382 414 Q 330 482, 280 460" stroke="#21759b" stroke-width="2" opacity=".25"/>
        <path d="M 382 414 Q 330 482, 280 460" class="anim-dash" style="animation-delay:.9s" stroke="#21759b" stroke-width="2"/>
      </g>

      <!-- ============= iPhone (left, slightly tilted left) ============= -->
      <g class="anim-float-l">
        <g transform="translate(178 280)">
          <!-- shadow -->
          <rect x="-66" y="-118" width="132" height="240" rx="26" fill="#0c4a63" opacity=".18" transform="translate(2 6)"/>
          <!-- bezel -->
          <rect x="-64" y="-122" width="128" height="244" rx="26" fill="url(#bezelDark)"/>
          <!-- screen -->
          <rect x="-60" y="-118" width="120" height="236" rx="22" fill="url(#iosScreen)"/>
          <!-- notch -->
          <rect x="-18" y="-118" width="36" height="10" rx="5" fill="#0e2230"/>
          <!-- side button + volume -->
          <rect x="-66" y="-92" width="2" height="14" rx="1" fill="#0c4a63"/>
          <rect x="-66" y="-72" width="2" height="22" rx="1" fill="#0c4a63"/>
          <rect x="-66" y="-44" width="2" height="22" rx="1" fill="#0c4a63"/>
          <rect x="64" y="-66" width="2" height="32" rx="1" fill="#0c4a63"/>
        </g>

        <!-- screen content (clipped to screen bounds) -->
        <g clip-path="url(#iosClip)">
          <!-- status bar -->
          <text x="130" y="172" font-family="Inter" font-size="7" font-weight="700" fill="#0e2230">9:41</text>
          <g transform="translate(218 168)">
            <!-- signal -->
            <rect x="0" y="2" width="1.5" height="3" fill="#0e2230"/>
            <rect x="2.4" y="1" width="1.5" height="4" fill="#0e2230"/>
            <rect x="4.8" y="0" width="1.5" height="5" fill="#0e2230"/>
            <rect x="7.2" y="-1" width="1.5" height="6" fill="#0e2230"/>
            <!-- wifi -->
            <path d="M 12 4 a 4 4 0 0 1 6 0" fill="none" stroke="#0e2230" stroke-width="1"/>
            <path d="M 13.5 4.5 a 2.4 2.4 0 0 1 3 0" fill="none" stroke="#0e2230" stroke-width="1"/>
            <circle cx="15" cy="5" r=".7" fill="#0e2230"/>
            <!-- battery -->
            <rect x="20" y="0.5" width="10" height="5" rx="1.4" fill="none" stroke="#0e2230" stroke-width=".7"/>
            <rect x="21" y="1.5" width="7" height="3" rx=".6" fill="#3fb98d"/>
          </g>

          <!-- Header bar -->
          <rect x="118" y="180" width="120" height="34" fill="url(#headerBlue)"/>
          <!-- avatar -->
          <circle cx="132" cy="197" r="6" fill="#ffb74a"/>
          <text x="129" y="200" font-family="Inter" font-size="7" font-weight="800" fill="#0c4a63">A</text>
          <!-- title -->
          <rect x="144" y="192" width="46" height="3.6" rx="1.8" fill="#ffffff"/>
          <rect x="144" y="200" width="34" height="2.6" rx="1.3" fill="#ffffff" opacity=".7"/>
          <!-- bell with badge -->
          <g transform="translate(220 195)">
            <path d="M 0 0 a 4 4 0 0 1 8 0 v 4 l 1.4 2 H -1.4 L 0 4 Z" fill="#ffffff"/>
            <circle cx="2" cy="6" r="1.3" fill="#ffffff"/>
            <circle cx="8" cy="-1" r="2.2" fill="#ff6b5b" stroke="#ffffff" stroke-width=".7"/>
          </g>

          <!-- Hero feed card (bigger) -->
          <g transform="translate(126 224)">
            <rect x="0" y="0" width="104" height="46" rx="6" fill="#ffffff" stroke="#cfdde5"/>
            <!-- image -->
            <rect x="4" y="4" width="38" height="38" rx="4" fill="#d6ecf6"/>
            <path d="M 8 36 L 18 26 L 26 32 L 36 22 L 40 26 V 38 H 8 Z" fill="#21759b" opacity=".6"/>
            <circle cx="32" cy="14" r="3" fill="#ffb74a"/>
            <!-- text lines -->
            <rect x="48" y="6"  width="48" height="3.4" rx="1.7" fill="#0e2230"/>
            <rect x="48" y="13" width="40" height="2.6" rx="1.3" fill="#0e2230" opacity=".55"/>
            <rect x="48" y="19" width="44" height="2.6" rx="1.3" fill="#0e2230" opacity=".55"/>
            <!-- chip -->
            <rect x="48" y="28" width="22" height="6" rx="3" fill="#3fb98d" opacity=".22"/>
            <text x="51" y="33" font-family="Inter" font-size="4" font-weight="700" fill="#1a8a64">LIVE</text>
            <!-- bookmark -->
            <path d="M 92 28 v 12 l 4 -3 l 4 3 v -12 z" fill="#7c6cf2"/>
          </g>

          <!-- Scrolling feed below -->
          <g class="anim-feed">
            <g transform="translate(126 278)">
              <!-- card 1 -->
              <rect x="0" y="0" width="104" height="22" rx="5" fill="#ffffff" stroke="#cfdde5"/>
              <rect x="4" y="4" width="14" height="14" rx="3" fill="#7c6cf2" opacity=".22"/>
              <circle cx="11" cy="11" r="3" fill="#7c6cf2"/>
              <rect x="22" y="6"  width="50" height="2.8" rx="1.4" fill="#0e2230"/>
              <rect x="22" y="11" width="38" height="2.2" rx="1.1" fill="#0e2230" opacity=".55"/>
              <rect x="22" y="15" width="28" height="2.2" rx="1.1" fill="#0e2230" opacity=".4"/>
              <rect x="84" y="9" width="14" height="6" rx="3" fill="#21759b"/>
              <!-- card 2 -->
              <rect x="0" y="26" width="104" height="22" rx="5" fill="#ffffff" stroke="#cfdde5"/>
              <rect x="4" y="30" width="14" height="14" rx="3" fill="#3fb98d" opacity=".22"/>
              <path d="M 7 39 l 3 3 l 6 -6" fill="none" stroke="#3fb98d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="22" y="32" width="48" height="2.8" rx="1.4" fill="#0e2230"/>
              <rect x="22" y="37" width="40" height="2.2" rx="1.1" fill="#0e2230" opacity=".55"/>
              <rect x="22" y="41" width="30" height="2.2" rx="1.1" fill="#0e2230" opacity=".4"/>
              <rect x="84" y="35" width="14" height="6" rx="3" fill="#3fb98d"/>
              <!-- card 3 -->
              <rect x="0" y="52" width="104" height="22" rx="5" fill="#ffffff" stroke="#cfdde5"/>
              <rect x="4" y="56" width="14" height="14" rx="3" fill="#ffb74a" opacity=".22"/>
              <path d="M 11 60 l 1.6 3.4 l 3.6 .4 l -2.6 2.4 l .8 3.6 l -3.4 -1.8 l -3.4 1.8 l .8 -3.6 l -2.6 -2.4 l 3.6 -.4 z" fill="#f5a623"/>
              <rect x="22" y="58" width="46" height="2.8" rx="1.4" fill="#0e2230"/>
              <rect x="22" y="63" width="38" height="2.2" rx="1.1" fill="#0e2230" opacity=".55"/>
              <rect x="22" y="67" width="32" height="2.2" rx="1.1" fill="#0e2230" opacity=".4"/>
            </g>
          </g>

          <!-- Tab bar (iOS) -->
          <rect x="118" y="378" width="120" height="24" fill="#ffffff"/>
          <rect x="118" y="378" width="120" height=".7" fill="#cfdde5"/>
          <g transform="translate(132 386)">
            <path d="M 0 6 L 5 1 L 10 6 V 12 H 0 Z" fill="#21759b"/>
          </g>
          <g transform="translate(160 386)" opacity=".6">
            <circle cx="5" cy="6" r="4.5" fill="none" stroke="#0e2230" stroke-width="1.2"/>
            <path d="M 8 9 L 11 12" stroke="#0e2230" stroke-width="1.2" stroke-linecap="round"/>
          </g>
          <g transform="translate(188 386)" opacity=".6">
            <rect x="0" y="2" width="10" height="8" rx="1.4" fill="none" stroke="#0e2230" stroke-width="1.2"/>
            <path d="M 2 5 H 8 M 2 7 H 6" stroke="#0e2230" stroke-width="1.2" stroke-linecap="round"/>
          </g>
          <g transform="translate(216 386)" opacity=".6">
            <circle cx="5" cy="4" r="2.4" fill="none" stroke="#0e2230" stroke-width="1.2"/>
            <path d="M 1 12 a 4 4 0 0 1 8 0" fill="none" stroke="#0e2230" stroke-width="1.2"/>
          </g>
          <!-- home indicator -->
          <rect x="160" y="396" width="36" height="2.4" rx="1.2" fill="#0e2230" opacity=".7"/>
        </g>

        <!-- iOS notification (popping in) -->
        <g class="anim-notif" transform="translate(178 154)">
          <rect x="-58" y="-10" width="116" height="20" rx="6" fill="#ffffff" stroke="#cfdde5"/>
          <rect x="-54" y="-6" width="10" height="10" rx="2.4" fill="#21759b"/>
          <rect x="-52" y="-4" width="6" height="2" rx="1" fill="#ffffff"/>
          <rect x="-52" y="-1" width="6" height="2" rx="1" fill="#ffffff"/>
          <rect x="-52" y="2"  width="3" height="2" rx="1" fill="#ffffff"/>
          <rect x="-40" y="-6" width="58" height="3" rx="1.5" fill="#0e2230"/>
          <rect x="-40" y="0"  width="48" height="2.4" rx="1.2" fill="#0e2230" opacity=".55"/>
          <text x="38" y="-1" font-family="Inter" font-size="4" font-weight="600" fill="#0e2230" opacity=".55">now</text>
        </g>
      </g>

      <!-- ============= Android phone (right, tilted right) ============= -->
      <g class="anim-float-r">
        <g transform="translate(382 292)">
          <!-- shadow -->
          <rect x="-66" y="-122" width="132" height="244" rx="18" fill="#0c4a63" opacity=".18" transform="translate(2 6)"/>
          <!-- bezel -->
          <rect x="-64" y="-126" width="128" height="248" rx="18" fill="url(#bezelDark)"/>
          <!-- screen -->
          <rect x="-60" y="-122" width="120" height="240" rx="14" fill="url(#androidScreen)"/>
          <!-- punch-hole camera -->
          <circle cx="0" cy="-114" r="3.2" fill="#0e2230"/>
          <circle cx="0" cy="-114" r="1.4" fill="#1c3a4f"/>
          <!-- volume + power -->
          <rect x="64" y="-86" width="2" height="22" rx="1" fill="#0c4a63"/>
          <rect x="64" y="-58" width="2" height="32" rx="1" fill="#0c4a63"/>
        </g>

        <g clip-path="url(#androidClip)">
          <!-- Android status bar -->
          <text x="334" y="184" font-family="Inter" font-size="7" font-weight="600" fill="#0e2230">12:08</text>
          <g transform="translate(420 180)">
            <!-- battery -->
            <rect x="0" y=".5" width="10" height="5" rx="1.4" fill="none" stroke="#0e2230" stroke-width=".7"/>
            <rect x="1" y="1.5" width="6" height="3" rx=".6" fill="#3fb98d"/>
            <!-- wifi -->
            <path d="M -12 4 a 4 4 0 0 1 6 0" fill="none" stroke="#0e2230" stroke-width="1"/>
            <circle cx="-9" cy="5" r=".7" fill="#0e2230"/>
            <!-- signal bars -->
            <rect x="-22" y="2" width="1.5" height="3" fill="#0e2230"/>
            <rect x="-19.6" y="1" width="1.5" height="4" fill="#0e2230"/>
            <rect x="-17.2" y="0" width="1.5" height="5" fill="#0e2230"/>
            <rect x="-14.8" y="-1" width="1.5" height="6" fill="#0e2230"/>
          </g>

          <!-- Material header -->
          <rect x="322" y="190" width="120" height="38" fill="url(#headerMint)"/>
          <!-- hamburger -->
          <g transform="translate(330 204)" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round">
            <path d="M 0 0 H 10"/>
            <path d="M 0 4 H 10"/>
            <path d="M 0 8 H 10"/>
          </g>
          <rect x="346" y="201" width="46" height="3.6" rx="1.8" fill="#ffffff"/>
          <rect x="346" y="209" width="32" height="2.6" rx="1.3" fill="#ffffff" opacity=".7"/>
          <!-- search icon -->
          <g transform="translate(412 204)" stroke="#ffffff" stroke-width="1.4" fill="none">
            <circle cx="3" cy="3" r="3"/>
            <path d="M 5 5 L 8 8" stroke-linecap="round"/>
          </g>
          <!-- avatar -->
          <circle cx="430" cy="207" r="5" fill="#ffb74a"/>
          <text x="427.5" y="210" font-family="Inter" font-size="6" font-weight="800" fill="#0c4a63">A</text>

          <!-- Tabs -->
          <g transform="translate(322 232)">
            <text x="14" y="9" font-family="Inter" font-size="6" font-weight="700" fill="#3fb98d">FEED</text>
            <text x="50" y="9" font-family="Inter" font-size="6" font-weight="600" fill="#0e2230" opacity=".55">SAVED</text>
            <text x="92" y="9" font-family="Inter" font-size="6" font-weight="600" fill="#0e2230" opacity=".55">YOU</text>
            <rect x="11" y="14" width="22" height="2" rx="1" fill="#3fb98d"/>
            <rect x="0" y="16" width="120" height=".7" fill="#cfdde5"/>
          </g>

          <!-- Stats card with animated bars -->
